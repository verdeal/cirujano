<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cirujano v6.1</title>
<style>
:root{--bg:#0A0A0F;--card:#14141C;--card2:#1C1C26;--card3:#242430;--brd:#2A2A38;--brd2:#3A3A48;--tx:#F0F0F5;--tx2:#C0C0CC;--tx3:#9090A0;--tx4:#606070;--tx5:#404050;--green:#34D399;--red:#EF4444;--amber:#F59E0B;--blue:#3B82F6;--purple:#A78BFA;--calido:#F97316;--frio:#7CD4F4;--oscuro:#A78BFA;--calido-bg:rgba(249,115,22,.15);--frio-bg:rgba(124,212,244,.15);--oscuro-bg:rgba(167,139,250,.15);--calido-br:rgba(249,115,22,.4);--frio-br:rgba(124,212,244,.4);--oscuro-br:rgba(167,139,250,.4)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overscroll-behavior:none}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.app{max-width:1100px;margin:0 auto;padding:14px 12px 40px}
.top{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.top-logo{font-size:11px;letter-spacing:3px;color:var(--green);font-weight:800}
.top-spacer{flex:1}
.top-search{flex:1;background:var(--card2);border:1px solid var(--brd);color:var(--tx);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:13px;min-width:180px;max-width:340px}
.top-search::placeholder{color:var(--tx4)}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--card2);padding:4px;border-radius:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:9px 12px;font-size:12px;font-weight:700;color:var(--tx3);background:none;border:none;border-radius:7px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.tab.on{background:var(--card);color:var(--tx)}
.h1{font-size:24px;font-weight:800;letter-spacing:-0.3px;margin-bottom:6px}
.h2{font-size:18px;font-weight:800;margin:16px 0 10px;letter-spacing:-0.2px}
.h3{font-size:13px;font-weight:800;margin:14px 0 8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--green)}
.h-sub{font-size:13px;color:var(--tx3);margin-bottom:14px;line-height:1.6}
.h-sub b{color:var(--tx2)}
.card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:12px}
.card2{background:var(--card2);border:1px solid var(--brd);border-radius:11px;padding:13px;margin-bottom:9px}
.banner{padding:13px;border-radius:11px;margin-bottom:12px;font-size:13px;line-height:1.55}
.banner-g{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.3);color:var(--tx2)}
.banner-g b{color:var(--green)}
.banner-a{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);color:var(--tx2)}
.banner-a b{color:var(--amber)}
.banner-b{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.3);color:var(--tx2)}
.banner-b b{color:var(--blue)}
.btn{padding:11px 14px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid var(--brd);background:var(--card);color:var(--tx)}
.btn:active{transform:scale(.98)}
.btn-pri{background:var(--green);color:#0A0A0F;border-color:var(--green)}
.btn-block{width:100%;margin-top:10px}
.btn-back{background:none;border:none;color:var(--tx3);font-family:inherit;font-size:13px;padding:8px 0;cursor:pointer;display:block;text-align:center;width:100%}
.cu-pill{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:1px}
.cu-pill.calido{background:var(--calido-bg);color:var(--calido)}
.cu-pill.frio{background:var(--frio-bg);color:var(--frio)}

.tag-rare{display:inline-block;padding:2px 7px;border-radius:5px;background:rgba(245,158,11,.18);color:var(--amber);font-size:10px;font-weight:700;letter-spacing:.5px;margin-left:5px}
.pg{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.pg-d{width:8px;height:8px;border-radius:50%;background:var(--brd)}
.pg-d.on{background:var(--green);transform:scale(1.4)}
.pg-d.done{background:var(--green);opacity:.5}
.q{background:var(--card);border:1px solid var(--brd);border-radius:18px;padding:18px 16px;margin-bottom:12px}

.q-t{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:8px;line-height:1.3}

.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--card2);border:1.5px solid var(--brd);border-radius:14px;padding:13px;display:flex;align-items:flex-start;gap:11px;text-align:left;color:var(--tx);font-family:inherit;font-size:14px;width:100%;cursor:pointer;position:relative}

.opt-ex{font-size:11.5px;color:var(--tx3);line-height:1.5;padding-top:5px;border-top:1px solid var(--brd)}

.trail{background:var(--card2);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:11px;color:var(--tx3);line-height:1.7}

.tp{background:var(--card2);border:1.5px solid var(--brd);border-radius:14px;padding:13px;cursor:pointer;color:var(--tx);font-family:inherit;width:100%;font-size:13.5px;margin-bottom:9px;text-align:left}
.tp.calido{border-color:var(--calido-br)}
.tp.frio{border-color:var(--frio-br)}

.tp-h{display:flex;align-items:center;gap:9px;margin-bottom:6px;flex-wrap:wrap}
.tp-h-ic{font-size:22px}
.tp-h-l{font-weight:800;font-size:15px}
.tp-h-l.calido{color:var(--calido)}
.tp-h-l.frio{color:var(--frio)}
.tp-h-l.oscuro{color:var(--oscuro)}
.tp-face{font-size:12px;color:var(--tx3);margin-bottom:8px;font-style:italic}
.tp-ctx{font-size:12.5px;color:var(--tx2);line-height:1.55;padding:8px 10px;background:var(--card);border-radius:8px;margin-top:5px}

.ep{background:var(--card2);border:1.5px solid var(--brd);border-radius:14px;padding:13px;cursor:pointer;color:var(--tx);font-family:inherit;width:100%;font-size:14px;margin-bottom:9px;text-align:left}
.ep-l{font-weight:800;font-size:15px;color:var(--tx);margin-bottom:5px}
.ep-d{font-size:12.5px;color:var(--tx2);line-height:1.5}
.res{background:var(--card);border-radius:18px;padding:18px 16px;margin-bottom:12px;border:2px solid var(--brd)}
.res.primary{border-color:var(--green)}
.res.secondary{border-color:var(--amber);opacity:.95}
.res-tag{font-size:10px;letter-spacing:2px;font-weight:800;margin-bottom:8px;text-transform:uppercase}
.res.primary .res-tag{color:var(--green)}
.res.secondary .res-tag{color:var(--amber)}
.res-id{display:inline-block;padding:5px 10px;border-radius:7px;font-size:13px;font-weight:800;letter-spacing:1px;margin-right:8px}
.res-n{font-size:20px;font-weight:800;color:var(--tx);margin:6px 0;line-height:1.25}
.res-temp{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;font-size:13px;font-weight:800;margin-right:6px}
.res-temp.calido{background:var(--calido-bg);color:var(--calido)}
.res-temp.frio{background:var(--frio-bg);color:var(--frio)}
.res-temp.oscuro{background:var(--oscuro-bg);color:var(--oscuro)}
.res-energy{display:inline-block;padding:4px 10px;border-radius:6px;background:var(--card3);color:var(--tx);font-size:12px;font-weight:700}
.res-d{font-size:14px;color:var(--tx2);line-height:1.6;margin:10px 0;font-style:italic;padding-left:10px;border-left:2px solid var(--brd)}
.res-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--brd)}
.res-section-t{font-size:10px;letter-spacing:1.5px;color:var(--tx4);font-weight:800;margin-bottom:8px;text-transform:uppercase}
.res-meta{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:5px}
.res-meta b{color:var(--tx);font-weight:700}
.val{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:11px;margin-top:11px}
.val-t{font-size:10px;letter-spacing:1.5px;color:var(--amber);font-weight:800;margin-bottom:7px}
.val-q{font-size:12.5px;color:var(--tx);margin-bottom:7px;line-height:1.5;padding-left:18px;position:relative}
.val-q:before{content:"✓";position:absolute;left:0;color:var(--green);font-weight:700}
.lst{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:11px;margin-bottom:7px;cursor:pointer;display:flex;gap:11px;align-items:flex-start}
.lst:active{background:var(--card2)}
.lst-id{padding:4px 9px;border-radius:6px;font-size:13px;font-weight:800;letter-spacing:1px;flex-shrink:0;min-width:38px;text-align:center}
.lst-bd{flex:1;min-width:0}
.lst-n{font-weight:800;color:var(--tx);margin-bottom:2px;font-size:14.5px}
.lst-d{font-size:12px;color:var(--tx3);line-height:1.4}
.zh{font-size:10px;letter-spacing:2px;color:var(--green);font-weight:800;margin:14px 0 8px;text-transform:uppercase}
.zh:first-child{margin-top:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
@media(min-width:760px){.modal-bg{align-items:center}}
.modal-bg.on{display:flex}
.modal{background:var(--card);border:1px solid var(--brd2);border-radius:18px 18px 0 0;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;padding:18px 16px}
@media(min-width:760px){.modal{border-radius:18px}}
.modal-h{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--brd)}
.modal-t{font-size:17px;font-weight:800;flex:1;line-height:1.3}
.modal-x{background:var(--card3);color:var(--tx);border:1px solid var(--brd);border-radius:8px;padding:6px 10px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:700}
.map-wrap{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:14px;overflow-x:auto}
.map-svg{display:block;margin:0 auto;min-width:600px;max-width:100%}
.tw{overflow-x:auto;background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px}
table.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:7px 5px;color:var(--tx3);font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--brd)}
.tbl td{padding:7px 5px;border-bottom:1px solid var(--brd);color:var(--tx2);vertical-align:top}
.tbl td.id{font-weight:800;font-family:monospace;font-size:11px;text-align:center}
.tbl td.name{font-weight:700;color:var(--tx)}
.tbl .has{color:var(--green);font-weight:700}
.tbl .raro{color:var(--amber);font-size:11px}
.tbl .no{color:var(--tx5);font-size:11px}
.dist-c{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:13px;margin-bottom:9px}
.dist-c-h{font-weight:800;color:var(--tx);margin-bottom:8px;font-size:14px}
.dist-c-row{font-size:12.5px;color:var(--tx2);line-height:1.55;margin-bottom:5px}
.dist-c-row b{color:var(--tx)}
.dist-c-vs{color:var(--amber);font-weight:800;padding:0 4px}
.mech-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:760px){.mech-grid{grid-template-columns:1fr 1fr 1fr}}
.mech-c{background:var(--card2);border-radius:11px;padding:13px;border-top:3px solid var(--brd)}
.mech-c.arriba{border-top-color:var(--green)}
.mech-c.horiz{border-top-color:var(--frio)}
.mech-c.abajo{border-top-color:var(--oscuro)}
.mech-c-l{font-size:11px;letter-spacing:1.5px;font-weight:800;margin-bottom:5px}
.mech-c.arriba .mech-c-l{color:var(--green)}
.mech-c.horiz .mech-c-l{color:var(--frio)}
.mech-c.abajo .mech-c-l{color:var(--oscuro)}
.mech-c-t{font-size:15px;font-weight:800;margin-bottom:6px}
.mech-c-d{font-size:12.5px;color:var(--tx2);line-height:1.55;margin-bottom:8px}
.mech-c-cu{font-size:11.5px;color:var(--tx3)}
.mech-c-cu b{color:var(--tx2)}
.tb{background:var(--card);border:2px solid var(--brd);border-radius:14px;padding:15px;margin-bottom:11px}
.tb.calido{border-color:var(--calido-br)}
.tb.frio{border-color:var(--frio-br)}
.tb.oscuro{border-color:var(--oscuro-br)}
.tb-h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tb-ic{font-size:30px}
.tb-t{font-size:20px;font-weight:800}
.tb-t.calido{color:var(--calido)}
.tb-t.frio{color:var(--frio)}
.tb-t.oscuro{color:var(--oscuro)}
.tb-face{font-size:12.5px;color:var(--tx2);background:var(--card2);padding:9px;border-radius:8px;margin-bottom:9px;line-height:1.55}
.tb-face b{color:var(--tx)}
.tb-d{font-size:13px;color:var(--tx2);line-height:1.55;margin-bottom:8px}
.face-row{display:flex;gap:12px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.face-c{text-align:center;background:var(--card2);padding:13px;border-radius:11px;min-width:120px;border:2px solid var(--brd)}
.face-c.calido{border-color:var(--calido-br)}
.face-c.frio{border-color:var(--frio-br)}
.face-c.oscuro{border-color:var(--oscuro-br)}
.face-c-e{font-size:38px;margin-bottom:5px}
.face-c-l{font-size:12px;font-weight:800;letter-spacing:1px}
.face-c-l.calido{color:var(--calido)}
.face-c-l.frio{color:var(--frio)}
.face-c-l.oscuro{color:var(--oscuro)}
.face-c-d{font-size:10px;color:var(--tx3);margin-top:4px;line-height:1.4}
.pri{background:var(--card);border:1px solid var(--brd);border-left:3px solid var(--green);border-radius:10px;padding:13px;margin-bottom:9px}
.pri-n{font-size:10px;letter-spacing:2px;color:var(--green);font-weight:800;margin-bottom:5px}
.pri-t{font-weight:800;color:var(--tx);margin-bottom:4px;font-size:14px}
.pri-d{font-size:12.5px;color:var(--tx2);line-height:1.55}
.search-r{background:var(--card2);border:1px solid var(--brd);border-radius:10px;padding:11px;margin-bottom:7px;cursor:pointer}
.search-r:active{background:var(--card3)}
.search-r-cat{font-size:10px;letter-spacing:1.5px;color:var(--tx4);font-weight:700;margin-bottom:4px;text-transform:uppercase}
.search-r-t{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:3px}
.search-r-d{font-size:12px;color:var(--tx3);line-height:1.4}
.route-c{background:var(--card2);border-radius:11px;padding:13px;margin-bottom:9px}
.route-c-t{font-weight:800;font-size:14px;color:var(--tx);margin-bottom:8px}
.route-c-flow{font-size:13px;color:var(--tx2);line-height:1.7;font-family:"SF Mono",Menlo,monospace;background:var(--card);padding:9px;border-radius:7px;overflow-x:auto;white-space:nowrap}
.route-c-d{font-size:12.5px;color:var(--tx3);line-height:1.55;margin-top:8px}
.exc-c{background:var(--card);border:1px solid var(--brd);border-left:3px solid var(--purple);border-radius:11px;padding:13px;margin-bottom:9px}
.exc-c-h{font-weight:800;color:var(--tx);margin-bottom:6px;font-size:14px}
.exc-c-d{font-size:12.5px;color:var(--tx2);line-height:1.55}
.exc-c-d b{color:var(--tx)}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0 12px}
.chip{padding:5px 10px;border-radius:6px;background:var(--card3);color:var(--tx2);font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--brd);font-family:inherit}
.chip.on{background:var(--green);color:#0A0A0F;border-color:var(--green)}
.chip:active{transform:scale(.97)}
.search-input{width:100%;background:var(--card2);border:1px solid var(--brd);color:var(--tx);padding:10px 12px;border-radius:9px;font-family:inherit;font-size:13px;margin-bottom:10px}

.empty{padding:20px;text-align:center;color:var(--tx4);font-size:13px}

</head>
<body>
<div class="app">
<div class="top">
  <div class="top-logo">CIRUJANO V6.1</div>
  <div class="top-spacer"></div>
  <input class="top-search" id="globalSearch" placeholder="Buscar tracks, DJs, géneros, cuadros..." oninput="onGlobalSearch(this.value)">
</div>
<div class="tabs">
  <button class="tab on" data-tab="home" onclick="showTab('home')">Inicio</button>
  <button class="tab" data-tab="clas" onclick="showTab('clas')">Clasificar</button>
  <button class="tab" data-tab="cu" onclick="showTab('cu')">Cuadros</button>
  <button class="tab" data-tab="map" onclick="showTab('map')">Mapa</button>
  <button class="tab" data-tab="temps" onclick="showTab('temps')">Temperaturas</button>
  <button class="tab" data-tab="mech" onclick="showTab('mech')">Cuerpo</button>
  <button class="tab" data-tab="dist" onclick="showTab('dist')">Distinciones</button>
  <button class="tab" data-tab="djs" onclick="showTab('djs')">DJs</button>
  <button class="tab" data-tab="gen" onclick="showTab('gen')">Géneros</button>
  <button class="tab" data-tab="rt" onclick="showTab('rt')">Rutas</button>
  <button class="tab" data-tab="exc" onclick="showTab('exc')">Excepciones</button>
  <button class="tab" data-tab="rul" onclick="showTab('rul')">Reglas</button>
</div>
<div id="main"></div>
</div>
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-h">
      <div class="modal-t" id="modalTitle"></div>
      <button class="modal-x" onclick="closeModal()">Cerrar</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>
<script>

  calido:{label:"CÁLIDO",icon:"🟠",face:"😊",faceDesc:"cara de gusto — sonrisa, ojos relajados, expresión amable",short:"La música te genera placer reconocible",long:"Pones cara de gusto al escucharlo. La música te genera placer. Sonrisa visible o interna, ojos relajados, mejillas suaves. Puedes estar bailando, mecerte o llorar de emoción — pero la cara expresa que te está gustando. <b>Cálido NO depende del género</b>: Voices From The Lake ambient profundo es cálido si te genera cara de gusto. Burial triste es cálido porque la melancolía te genera placer estético."},

{h:"DJs transversales (no tienen cuadro fijo)",d:"Algunos DJs tienen tracks que viven en cuadros distintos. Cada track suyo se clasifica individualmente. <b>Ejemplos:</b> Laurent Garnier (C/E/K/M según track), Marco Pohl (E/WF según función), Donato Dozzy (I/L según modo)."},
{h:"DJs con 'modo viejo' vs 'modo actual'",d:"Algunos DJs evolucionaron de un cuadro a otro. <b>Ejemplos:</b> Julian Jeweil (viejo 125 BPM → E / actual 138 BPM → K), Maceo Plex (Conjure → E / Mainstage → K), Adam Beyer (deep techno viejo → E o J / Drumcode peak → K), Bart Skils."},
{h:"Tracks con duplicación legítima",d:"Un track puede vivir en 2 cuadros si sirve a ambos. Apple Music permite duplicar. <b>Ejemplos:</b> Tale of Us 'Astral' (E/K oscuro según lugar), Bodzin 'Powers Of Ten' (E/K cálido), Cerato 'Alive' (C/K cálido), Floating Points 'Last Bloom' (A/M cálido)."},
{h:"Tracks que dependen del CONTEXTO de pinchada",d:"El cuadro lo define la combinación TRACK + LUGAR. <b>Ejemplo:</b> Tale of Us 'Astral' en sala mediana = E oscuro. En Hï mainstage = K oscuro. Mismo track, distinto cuadro."},
{h:"Asimetría de temperaturas — algunas RARAS pero posibles",d:"Las 3 temperaturas siempre disponibles. Algunas marcadas como RARO POSIBLE. <b>Ejemplos:</b> Cálido en Tresor Berlin (Donato Dozzy bailable casi emotivo), Oscuro en Cafe del Mar (balearic melancólico nostálgico), Cálido en Berghain (Ben Klock con synth lead emocional residual)."},
{h:"Asimetría de energías — cuadros sin pico",d:"Algunos cuadros NO tienen pico. <b>Sin pico:</b> A (Cafe del Mar), F (The Loft), L (Atonal Berlin), M (Sonar Closing). <b>Solo apertura:</b> los 3 warm ups (WC, WF, WO)."},
{h:"Apertura del cuadro vs Warm up",d:"Hay diferencia entre abrir un cuadro con sus tracks más suaves o con un warm up laxo. <b>Ejemplo:</b> para abrir E (Central Club Porto) puedes (a) usar WF (warm up frío genérico transversal) o (b) empezar con tracks E en su modo más suave (Maceo Plex modo lento)."},
{h:"Cuadros borderline entre baile y escucha",d:"<b>Atonal Berlin (L)</b> es borderline: técnicamente bailable suavísimo pero también escucha activa. Voices From The Lake ejemplo perfecto — puede bailarse de pie suave o escucharse quieto. Es información, no problema."}

const REGLAS=[
{n:"REGLA 1",t:"Cada track lleva 3 etiquetas",d:"Cuadro + Temperatura + Energía. Ejemplo: Mulero loop a 132 BPM → I + Frío + Pico. Maceo Plex 'Conjure Bots' → E + Frío + Principal."},
{n:"REGLA 2",t:"Duplicación permitida (máx 2 cuadros)",d:"Apple Music permite que el mismo archivo viva en varias listas. Un track va a máx 2 cuadros si sirve a ambos. Si serviría a 3+, revisar la clasificación."},
{n:"REGLA 3",t:"DJ ≠ cuadro",d:"Cada track se clasifica individualmente. Garnier transversal va a varios cuadros. Jeweil viejo (E) ≠ Jeweil actual (K). El nombre del DJ no determina el cuadro — el track sí."},
{n:"REGLA 4",t:"Las 3 temperaturas siempre disponibles",d:"Cada cuadro tiene sus 3 temperaturas. Algunas marcadas como RARO POSIBLE para matices. Nunca cerradas como imposibles. Esto da flexibilidad para clasificar tracks con un toque inusual."},
{n:"REGLA 5",t:"Warm ups son sacos laxos transversales",d:"WC abre B, C, D, H. WF abre E, F, G, I. WO abre I, J, K. Un warm up sirve a varios cuadros. La frontera es porosa."},
{n:"REGLA 6",t:"Portadas por temperatura dominante",d:"Cada lista tiene una portada de color según su temperatura natural. Las temperaturas individuales se etiquetan en comentarios del track."},
{n:"REGLA 7",t:"Energía interna, no lista separada",d:"No se hacen listas 'F-Principal' y 'F-Pico'. Se etiqueta dentro del cuadro con sufijo. Esto evita explosión de listas."},
{n:"REGLA 8",t:"Tests de validación",d:"Cada cuadro tiene 3 tests. Si fallan después de clasificar, revisar. Los tests son la red de seguridad."},
{n:"REGLA 9",t:"Cara como medida universal de temperatura",d:"La definición de cálido/frío/oscuro se basa en la CARA que pones al escuchar. Cara de gusto = cálido. Cara neutra/empoderada = frío. Cara fruncida = oscuro. Universal y observable."},
{n:"REGLA 10",t:"Mecanismo del cuerpo es información anexa",d:"Arriba/Horizontal/Abajo es información extra para distinguir cuadros que comparten BPM o sonido. NO eje obligatorio."}

function renderHome(){document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>Sistema Cirujano v6.1</b> — sistema completo de clasificación de música electrónica para DJ. 13 cuadros + 3 warm ups = 16 listas. 3 ejes: Cuadro / Temperatura (la cara que pones) / Energía (principal o pico).</div><div class="card"><div class="h2">¿Cómo usar este sistema?</div><div class="h-sub">Esta app es una <b>Wikipedia + clasificador</b> del sistema cirujano. Tienes varias formas de usarla:</div><div class="card2"><b style="color:var(--green)">📋 Clasificar un track:</b> Pestaña <b>Clasificar</b> — preguntas paso a paso. Cada opción tiene botón <b>ⓘ</b> para info ampliada.</div><div class="card2"><b style="color:var(--green)">📚 Consultar un cuadro:</b> Pestaña <b>Cuadros</b> — las 16 listas con fichas técnicas completas.</div><div class="card2"><b style="color:var(--green)">🗺️ Mapa visual:</b> Pestaña <b>Mapa</b> — diagrama de los 16 cuadros con zonas y conexiones.</div><div class="card2"><b style="color:var(--green)">🟠 Temperaturas:</b> Pestaña <b>Temperaturas</b> — la teoría de la CARA (cálido/frío/oscuro).</div><div class="card2"><b style="color:var(--green)">🧍 Cuerpo:</b> Pestaña <b>Cuerpo</b> — mecanismos arriba/horizontal/abajo.</div><div class="card2"><b style="color:var(--green)">🔍 Distinciones:</b> Pestaña <b>Distinciones</b> — confusiones históricas resueltas.</div><div class="card2"><b style="color:var(--green)">🎧 Buscar DJs:</b> Pestaña <b>DJs</b> — 100+ DJs con filtros.</div><div class="card2"><b style="color:var(--green)">🎵 Buscar géneros:</b> Pestaña <b>Géneros</b> — 90+ géneros con filtros.</div><div class="card2"><b style="color:var(--green)">🛤️ Rutas de set:</b> Pestaña <b>Rutas</b> — 8 flujos típicos.</div><div class="card2"><b style="color:var(--green)">⚠️ Excepciones:</b> Pestaña <b>Excepciones</b> — casos especiales.</div><div class="card2"><b style="color:var(--green)">📜 Reglas:</b> Pestaña <b>Reglas</b> — 10 reglas operativas.</div><div class="card2"><b style="color:var(--green)">🔍 Búsqueda global:</b> caja arriba — busca en TODO (cuadros, DJs, géneros, distinciones, etc.).</div></div><div class="card"><div class="h2">El sistema en 1 minuto</div><div class="h-sub">3 ejes que NO se mezclan:</div><div class="pri"><div class="pri-n">EJE 1</div><div class="pri-t">CUADRO</div><div class="pri-d">La lista física en Apple Music. 16 listas: 13 cuadros propios (A-M) + 3 warm ups (WC, WF, WO).</div></div><div class="pri"><div class="pri-n">EJE 2</div><div class="pri-t">TEMPERATURA — la cara que pones</div><div class="pri-d">🟠 Cálido = cara de gusto · ⚪ Frío = cara neutra/empoderada · ⚫ Oscuro = ceño fruncido. Relativo a cada cuadro.</div></div><div class="pri"><div class="pri-n">EJE 3</div><div class="pri-t">ENERGÍA</div><div class="pri-d">Principal (sostén base, 1 hora) · Pico (clímax). Para warm ups: solo Apertura.</div></div></div><div class="card"><div class="h2">Las 3 caras</div><div class="h-sub">La temperatura se determina por la CARA que pones al escuchar el track. Universal y observable.</div><div class="face-row"><div class="face-c calido"><div class="face-c-e">😊</div><div class="face-c-l calido">CÁLIDO</div><div class="face-c-d">Cara de gusto<br>Sonrisa, ojos relajados</div></div><div class="face-c frio"><div class="face-c-e">😐</div><div class="face-c-l frio">FRÍO</div><div class="face-c-d">Cara neutra/empoderada<br>Sin sonrisa ni frunce</div></div><div class="face-c oscuro"><div class="face-c-e">😟</div><div class="face-c-l oscuro">OSCURO</div><div class="face-c-d">Ceño fruncido<br>Susto, sospecha, tensión</div></div></div></div><div class="card"><div class="h2">Las 16 listas</div><div class="h-sub">Por flujo natural de set DJ — de luminoso a intenso a cierre.</div>${renderListGroups()}</div>`}
function renderClassifier(){state={node:"start",path:[],trail:[],resultCuadros:null,temp:null,energy:null};renderClassifierStep()}
function renderClassifierStep(){const node=TREE[state.node];if(!node)return;const dots=[];for(let i=0;i<4;i++){const cls=i<state.path.length?"done":(i===state.path.length?"on":"");dots.push(`<div class="pg-d ${cls}"></div>`)}const opts=node.opts.map(o=>`<div class="opt" onclick='clasPick(${JSON.stringify(o.next)},${JSON.stringify(o.l)})'>${o.info?`<button class="opt-info" onclick="event.stopPropagation();showInfoModal(${JSON.stringify(o.l).replace(/"/g,'&quot;')},${JSON.stringify(o.info).replace(/"/g,'&quot;')})">ⓘ</button>`:""}<div class="opt-ic">${o.ic}</div><div class="opt-bd"><div class="opt-l">${o.l}</div><div class="opt-d">${o.d}</div>${o.ex?`<div class="opt-ex">${o.ex}</div>`:""}</div></div>`).join("");const trailHtml=state.trail.length?`<div class="trail">${state.trail.map(t=>`<div><b>${t.q.replace(/<[^>]+>/g,'')}</b> → ${t.a}</div>`).join("")}</div>`:"";document.getElementById("main").innerHTML=`${state.node==="start"?`<div class="banner banner-g"><b>Clasificador paso a paso.</b> Responde 2-4 preguntas y obtendrás cuadro + temperatura + energía. Cada opción tiene botón <b>ⓘ</b> para info ampliada.</div>`:""}<div class="pg">${dots.join("")}</div><div class="q"><div class="q-num">PREGUNTA ${state.path.length+1}</div><div class="q-t">${node.q}</div>${node.s?`<div class="q-s">${node.s}</div>`:""}<div class="opts">${opts}</div></div>${state.path.length>0?`<button class="btn btn-block" onclick="clasBack()">← Atrás</button>`:""}${trailHtml}`}
function clasPick(next,label){state.trail.push({q:TREE[state.node]?.q||"",a:label});state.path.push(state.node);if(typeof next==="object"&&next.cuadro){state.resultCuadros=[next.cuadro];renderTempPicker();return}if(TREE[next]&&TREE[next].multi){state.resultCuadros=TREE[next].multi;renderTempPicker();return}state.node=next;renderClassifierStep()}
function clasBack(){if(state.energy){state.energy=null;renderEnergyPicker();return}if(state.temp){state.temp=null;renderTempPicker();return}if(state.resultCuadros){state.resultCuadros=null;state.node=state.path.pop();state.trail.pop();renderClassifierStep();return}if(state.path.length===0)return;state.node=state.path.pop();state.trail.pop();renderClassifierStep()}
function renderTempPicker(){const cuadros=state.resultCuadros;const isMulti=cuadros.length>1;const cuadrosInfo=cuadros.map((id,i)=>{const C=CUADROS[id];return `<div class="res ${i===0?'primary':'secondary'}"><div class="res-tag">${i===0?'CUADRO PRINCIPAL':'TAMBIÉN PODRÍA SER'}</div><div><span class="res-id" style="${pillStyle(C.tempColor)}">${id}</span></div><div class="res-n">${C.icon} ${C.n}</div><div class="res-d">${C.intro}</div></div>`}).join("");const tempCards=['calido','frio','oscuro'].map(t=>{const def=TEMP_DEF[t];const anyRare=cuadros.some(cid=>CUADROS[cid].temps[t].rare);const ctxBlocks=cuadros.map(cid=>{const C=CUADROS[cid];const ctx=C.temps[t];const rareTag=ctx.rare?`<span class="tag-rare">RARO PERO POSIBLE</span>`:'';return `<div class="tp-ctx"><b>En ${cid} ${C.n}:</b> ${rareTag}<br>${ctx.def}${ctx.examples?`<br><br><b>Ejemplos:</b> ${ctx.examples}`:""}</div>`}).join("");return `<div class="tp ${t}" onclick='pickTemp("${t}")'><div class="tp-h"><div class="tp-h-ic">${def.icon}</div><div class="tp-h-l ${t}">${def.label}</div><span style="font-size:22px">${def.face}</span></div><div class="tp-face">${def.faceDesc}</div>${ctxBlocks}</div>`}).join("");const multiHdr=isMulti?`<div class="banner banner-a"><b>Track con duplicación.</b> Vivirá en ${cuadros.length} cuadros con la misma temperatura.</div>`:"";document.getElementById("main").innerHTML=`${multiHdr}${cuadrosInfo}<div class="q" style="margin-top:14px"><div class="q-num">PASO 2 · TEMPERATURA</div><div class="q-t">¿Qué TEMPERATURA tiene el track?</div><div class="q-s">La temperatura se determina por la <b>CARA que pones al escucharlo</b>. Lee los ejemplos en cada cuadro.</div>${tempCards}</div><button class="btn btn-block" onclick="clasBack()">← Atrás</button>`}
function pickTemp(t){state.temp=t;const allSimple=state.resultCuadros.every(id=>CUADROS[id].energias.length===1);if(allSimple){state.energy=CUADROS[state.resultCuadros[0]].energias[0];renderClassifierResult()}else{renderEnergyPicker()}}
function renderEnergyPicker(){const C=CUADROS[state.resultCuadros[0]];const opts=[];if(C.energias.includes("principal"))opts.push({id:"principal",l:"PRINCIPAL",d:"La energía base del cuadro. Sostén donde puedes estar 1 hora sin cambio."});if(C.energias.includes("pico"))opts.push({id:"pico",l:"PICO",d:"Clímax dentro del cuadro. Track de rotura, peak rotundo."});if(C.energias.includes("apertura"))opts.push({id:"apertura",l:"APERTURA",d:"Track de inicio que prepara el cuadro. Los warm ups son siempre apertura."});document.getElementById("main").innerHTML=`<div class="q"><div class="q-num">PASO 3 · ENERGÍA</div><div class="q-t">¿Es PRINCIPAL o PICO?</div><div class="q-s">Dentro de <b>${C.n}</b>: <b>Principal</b> = sostén base. <b>Pico</b> = clímax rotundo.</div>${opts.map(e=>`<div class="ep" onclick='pickEnergy("${e.id}")'><div class="ep-l">${e.l}</div><div class="ep-d">${e.d}</div></div>`).join("")}</div><button class="btn btn-block" onclick="clasBack()">← Atrás</button>`}
function pickEnergy(e){state.energy=e;renderClassifierResult()}
function renderClassifierResult(){const cuadros=state.resultCuadros;const temp=state.temp;const energy=state.energy;const isMulti=cuadros.length>1;const tempDef=TEMP_DEF[temp];const cards=cuadros.map((id,i)=>{const C=CUADROS[id];const cls=i===0?"res primary":"res secondary";const tag=i===0?(isMulti?"CUADRO PRINCIPAL":"DIAGNÓSTICO"):"TAMBIÉN VIVE EN";const tempCtx=C.temps[temp];const rareWarning=tempCtx.rare?`<div class="banner banner-a" style="margin:10px 0"><b>⚠ Temperatura inusual en este cuadro:</b> es válida y útil para matices, pero no es la temperatura natural. Verifica con los tests.</div>`:'';return `<div class="${cls}"><div class="res-tag">${tag}</div><div><span class="res-id" style="${pillStyle(C.tempColor)}">${id}</span></div><div class="res-n">${C.icon} ${C.n}</div><span class="res-temp ${temp}">${tempDef.face} ${tempDef.icon} ${tempDef.label}</span><span class="res-energy">⚡ ${energy.toUpperCase()}</span>${rareWarning}<div class="res-d">${C.intro}</div><div class="res-section"><div class="res-section-t">DETALLE TÉCNICO</div><div class="res-meta">${C.detalle}</div></div><div class="res-section"><div class="res-section-t">${tempDef.label} en ${C.n}</div><div class="res-meta"><b>Definición:</b> ${tempCtx.def}</div>${tempCtx.examples?`<div class="res-meta" style="margin-top:6px"><b>Ejemplos:</b> ${tempCtx.examples}</div>`:""}</div><div class="res-section"><div class="res-section-t">REFERENCIAS</div><div class="res-meta"><b>📍 Lugares:</b> ${C.lugares}</div><div class="res-meta"><b>🎧 DJs:</b> ${C.djs}</div><div class="res-meta"><b>🎵 BPM:</b> ${C.bpm}</div><div class="res-meta"><b>🧍 Cuerpo:</b> ${C.cuerpoDesc}</div>${C.mecanismo?`<div class="res-meta"><b>⚙️ Mecanismo:</b> ${C.mecanismo}</div>`:""}</div><div class="val"><div class="val-t">⚠ VALIDACIÓN</div>${C.test.map(t=>`<div class="val-q">${t}</div>`).join("")}</div></div>`}).join("");const trailHtml=state.trail.length?`<div class="trail"><b>Camino recorrido:</b><br>${state.trail.map(t=>`<div>${t.q.replace(/<[^>]+>/g,'')} → <b>${t.a}</b></div>`).join("")}</div>`:"";document.getElementById("main").innerHTML=`${isMulti?`<div class="banner banner-a"><b>Duplicación.</b> Vive en ${cuadros.length} cuadros con misma temperatura y energía.</div>`:""}${cards}<div class="banner banner-b" style="margin-top:14px"><b>📂 En Apple Music:</b> añade el track a la lista <b>${cuadros.join(' + ')}</b> con etiqueta <b>${temp.toUpperCase()} · ${energy.toUpperCase()}</b>${isMulti?'. Va a las dos listas.':''}.<br>Etiqueta sugerida en comentarios: <b>${temp.charAt(0).toUpperCase()}${energy.charAt(0).toUpperCase()}${energy==='pico'?'i':''}</b></div>${trailHtml}<button class="btn btn-pri btn-block" onclick="renderClassifier()">Clasificar otro track</button><button class="btn btn-block" onclick="clasBack()">← Cambiar energía</button>`}

function closeModal(e){if(e&&e.target.id!=="modalBg")return;document.getElementById("modalBg").classList.remove("on")}
function renderCuadrosList(){document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>Las 16 listas del sistema</b> agrupadas por zona del flujo natural. Toca cualquiera para ver su ficha técnica completa.</div>${renderListGroups()}`}
function showCuadroDetail(id){const C=CUADROS[id];const tempBlocks=Object.entries(C.temps).map(([k,v])=>{const td=TEMP_DEF[k];const rareTag=v.rare?`<span class="tag-rare">RARO POSIBLE</span>`:'';return `<div class="tb ${k}"><div class="tb-h"><div class="tb-ic">${td.face}</div><div class="tb-t ${k}">${td.label}</div>${rareTag}</div><div class="tb-face"><b>${td.faceDesc}</b></div><div class="tb-d">${v.def}</div>${v.examples?`<div class="tb-d"><b>Ejemplos:</b> ${v.examples}</div>`:""}</div>`}).join("");const energiasText=C.energias.map(e=>e.charAt(0).toUpperCase()+e.slice(1)).join(" · ");document.getElementById("main").innerHTML=`<button class="btn-back" onclick="renderCuadrosList()">← Volver a listas</button><div class="res primary"><div class="res-tag">${C.tipo==='nuclear'?'CUADRO NUCLEAR':C.tipo==='warmup'?'WARM UP TRANSVERSAL':'CUADRO ESCUCHA'}</div><div><span class="res-id" style="${pillStyle(C.tempColor)}">${id}</span></div><div class="res-n">${C.icon} ${C.n}</div><div class="res-d">${C.intro}</div><div class="res-section"><div class="res-section-t">EXPLICACIÓN</div><div class="res-meta">${C.explicacion}</div></div><div class="res-section"><div class="res-section-t">CUÁNDO ELEGIRLO</div><div class="res-meta">${C.cuandoElegirlo}</div></div><div class="res-section"><div class="res-section-t">CUÁNDO NO ES ESTE CUADRO</div><div class="res-meta">${C.cuandoNO}</div></div><div class="res-section"><div class="res-section-t">DETALLE TÉCNICO</div><div class="res-meta">${C.detalle}</div></div><div class="res-section"><div class="res-section-t">REFERENCIAS</div><div class="res-meta"><b>📍 Lugares:</b> ${C.lugares}</div><div class="res-meta"><b>🎧 DJs:</b> ${C.djs}</div><div class="res-meta"><b>🎵 BPM:</b> ${C.bpm}</div><div class="res-meta"><b>🧍 Cuerpo:</b> ${C.cuerpoDesc}</div>${C.mecanismo?`<div class="res-meta"><b>⚙️ Mecanismo:</b> ${C.mecanismo}</div>`:""}<div class="res-meta"><b>⚡ Energías:</b> ${energiasText}</div></div><div class="res-section"><div class="res-section-t">TRANSICIONES</div><div class="res-meta">${C.transiciones}</div></div><div class="res-section"><div class="res-section-t">LAS 3 TEMPERATURAS EN ESTE CUADRO</div>${tempBlocks}</div><div class="val"><div class="val-t">⚠ TESTS DE VALIDACIÓN</div>${C.test.map(t=>`<div class="val-q">${t}</div>`).join("")}</div></div>`}
function renderMap(){const positions={A:{x:120,y:80},B:{x:300,y:80},C:{x:480,y:80},WC:{x:120,y:200},D:{x:300,y:200},WF:{x:480,y:200},E:{x:120,y:320},F:{x:300,y:320},G:{x:480,y:320},H:{x:300,y:440},WO:{x:120,y:560},I:{x:300,y:560},J:{x:480,y:560},K:{x:660,y:560},L:{x:300,y:680},M:{x:300,y:800}};const colorOf=tc=>tc==='calido'?'#F97316':tc==='frio'?'#7CD4F4':tc==='oscuro'?'#A78BFA':'#999';const nodes=Object.entries(CUADROS).map(([id,C])=>{const p=positions[id]||{x:400,y:400};const col=colorOf(C.tempColor);return `<g class="map-node" onclick="showCuadroDetail('${id}')"><circle cx="${p.x}" cy="${p.y}" r="36" fill="${col}" fill-opacity="0.18" stroke="${col}" stroke-width="2"/><text x="${p.x}" y="${p.y+5}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="18" font-weight="800" fill="${col}">${id}</text><text x="${p.x}" y="${p.y+58}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#C0C0CC">${C.n}</text></g>`}).join("");document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>Mapa visual del sistema.</b> 16 listas agrupadas por zonas, con colores por temperatura dominante. Toca cualquier nodo para ver su ficha completa.</div><div class="map-wrap"><svg class="map-svg" viewBox="0 0 800 880" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="20" width="760" height="120" fill="rgba(249,115,22,.05)" rx="14"/><text x="40" y="42" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#9090A0" letter-spacing="2">ZONA LUZ ABIERTA</text><rect x="20" y="160" width="760" height="60" fill="rgba(249,115,22,.05)" rx="14"/><text x="40" y="182" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#9090A0" letter-spacing="2">PISTA CALIENTE</text><rect x="20" y="240" width="760" height="60" fill="rgba(124,212,244,.05)" rx="14"/><text x="40" y="262" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#9090A0" letter-spacing="2">WARM UP FRÍO</text><rect x="20" y="280" width="760" height="120" fill="rgba(124,212,244,.05)" rx="14"/><text x="40" y="302" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#9090A0" letter-spacing="2">CLUB SELECTO</text><rect x="20" y="400" width="760" height="80" fill="rgba(124,212,244,.05)" rx="14"/><text x="40" y="422" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#9090A0" letter-spacing="2">VIAJE</text><rect x="20" y="500" width="760" height="120" fill="rgba(167,139,250,.05)" rx="14"/><text x="40" y="522" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#9090A0" letter-spacing="2">TECHNO INTENSO + WARM UP OSCURO</text><rect x="20" y="640" width="760" height="80" fill="rgba(167,139,250,.05)" rx="14"/><text x="40" y="662" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#9090A0" letter-spacing="2">AMBIENT MISTERIOSO</text><rect x="20" y="760" width="760" height="80" fill="rgba(249,115,22,.05)" rx="14"/><text x="40" y="782" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#9090A0" letter-spacing="2">CIERRE LLOROSO</text>${nodes}</svg></div><div class="card" style="margin-top:14px"><div class="h3">LEYENDA</div><div class="face-row"><div class="face-c calido"><div class="face-c-l calido">🟠 CÁLIDO</div><div class="face-c-d">A · B · C · WC · D · L · M</div></div><div class="face-c frio"><div class="face-c-l frio">⚪ FRÍO</div><div class="face-c-d">WF · E · F · H · I</div></div><div class="face-c oscuro"><div class="face-c-l oscuro">⚫ OSCURO</div><div class="face-c-d">G · WO · J</div></div></div><div class="h-sub" style="margin-top:10px">K (Neopop) es mixto — alberga las 3 temperaturas con mucha potencia.</div></div>`}
function renderTemps(){document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>La teoría de la cara.</b> La temperatura de cualquier track se determina por la CARA que pones al escucharlo. Es universal, observable, y aplica a todos los cuadros.</div>${['calido','frio','oscuro'].map(t=>{const def=TEMP_DEF[t];return `<div class="tb ${t}"><div class="tb-h"><div class="tb-ic">${def.face}</div><div class="tb-t ${t}">${def.icon} ${def.label}</div></div><div class="tb-face"><b>${def.faceDesc}</b></div><div class="tb-d"><b>En corto:</b> ${def.short}</div><div class="tb-d">${def.long}</div></div>`}).join("")}<div class="card"><div class="h3">CÓMO USAR LA TEORÍA AL CLASIFICAR</div><div class="h-sub">Pasos prácticos cuando estás clasificando un track:</div><div class="card2"><b style="color:var(--green)">1.</b> Escucha el track con atención (auriculares, sin distracción).</div><div class="card2"><b style="color:var(--green)">2.</b> Pon atención a tu CARA durante el escuche. ¿Qué expresión natural sale?</div><div class="card2"><b style="color:var(--green)">3.</b> Si sale sonrisa o relajación → cálido. Si sale neutralidad/pose → frío. Si sale frunce/tensión → oscuro.</div><div class="card2"><b style="color:var(--green)">4.</b> Verifica contra los ejemplos del cuadro al que has clasificado el track. Si coinciden → bien. Si no → revisa.</div></div><div class="card"><div class="h3">TEMPERATURA RELATIVA AL CUADRO</div><div class="h-sub">La temperatura significa cosas DISTINTAS en cada cuadro. Aunque la cara es universal, los ejemplos cambian.</div><div class="card2">Ejemplo: <b>Cara fruncida en Cafe del Mar</b> = balearic melancólico nostálgico (raro pero posible). <b>Cara fruncida en Berghain</b> = atmósfera densa opresiva (temperatura natural). Misma cara, contextos completamente distintos.</div><div class="card2">Por eso cada cuadro tiene sus 3 temperaturas con su propia definición y ejemplos. Las marcadas como <b>RARO POSIBLE</b> son las menos habituales pero válidas para matices.</div></div>`}
function renderMech(){document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>Mecanismos del cuerpo.</b> Información anexa para distinguir cuadros que comparten BPM o sonido. NO es eje del sistema, es información extra que ayuda.</div><div class="mech-grid"><div class="mech-c arriba"><div class="mech-c-l">↑ ARRIBA</div><div class="mech-c-t">El cuerpo se eleva</div><div class="mech-c-d">Cuerpo suave, cabeza alta, ojos abiertos, podrías conversar o tener copa en mano. La música acompaña sin pesar.</div><div class="mech-c-cu"><b>Cuadros:</b> A (estático), F (ligero), B (ligero social), M (contemplativo)</div></div><div class="mech-c horiz"><div class="mech-c-l">→ HORIZONTAL</div><div class="mech-c-t">El cuerpo en pista</div><div class="mech-c-d">Cuerpo activo bailando, sigues siendo tú. La música te lleva pero conservas consciencia.</div><div class="mech-c-cu"><b>Cuadros:</b> C (consciente), D (intenso), E (consciente), G (oscuro), H (hipnótico), L (borderline)</div></div><div class="mech-c abajo"><div class="mech-c-l">↓ ABAJO</div><div class="mech-c-t">El cuerpo se rinde</div><div class="mech-c-d">Cabeza baja, te disuelves. Pierdes consciencia de los demás. Te disuelves o te disuelve la sala.</div><div class="mech-c-cu"><b>Cuadros:</b> J (rendido al sitio), K (masivo a la masa), I (disuelto al loop)</div></div></div><div class="card" style="margin-top:14px"><div class="h2">Tres mecanismos de aplastar/anular (cuadros ABAJO)</div><div class="h-sub">Los 3 cuadros que te llevan abajo lo hacen de manera distinta:</div><div class="dist-c"><div class="dist-c-h">⚪ Tresor Berlin (I) — ANULA</div><div class="dist-c-row">Loops quirúrgicos limpios mecánicos. Mulero, Jeff Mills hipnótico. Te disuelves en repetición fría.</div></div><div class="dist-c"><div class="dist-c-h">🕳️ Berghain main floor (J) — APLASTA con atmósfera</div><div class="dist-c-row">Cueva industrial enorme, atmósfera densa de pads + percusión metálica. Es el LUGAR el que pesa, no solo el track.</div></div><div class="dist-c"><div class="dist-c-h">💥 Neopop main stage (K) — APLASTA con escala</div><div class="dist-c-row">Nave gigante 5000+ personas, pantalla LED, kick brutal 130-150 BPM. Te aplasta la magnitud del evento.</div></div></div><div class="card"><div class="h2">Dos mecanismos en zona horizontal selecta</div><div class="h-sub">Cuadros que comparten zona pero distinto mecanismo:</div><div class="dist-c"><div class="dist-c-h">🏛️ Central Club Porto (E) — TOMA</div><div class="dist-c-row">Synth retro chulo te toma el cuerpo activamente. Bailas como persona consciente.</div></div><div class="dist-c"><div class="dist-c-h">🪶 The Loft (F) — FLOTA</div><div class="dist-c-row">Loops elegantes evolutivos te elevan. ATRAPA pero NO ANULA — flotas con cabeza alta, copa en mano.</div></div><div class="dist-c"><div class="dist-c-h">🌑 Enter Space (G) — BAILA con sombra</div><div class="dist-c-row">Tech-house oscuro te baila pero envuelto en sombra. Family Minus / Cécille / BCN dark.</div></div></div>`}
function renderDist(){document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>Distinciones críticas.</b> Confusiones históricas que el sistema resuelve técnicamente. Estas son las pruebas de que el sistema funciona.</div>${DISTINCIONES.map(d=>`<div class="dist-c"><div class="dist-c-h">🟢 ${d.h}</div>${d.rows.map(r=>`<div class="dist-c-row"><b>${r.l||""}</b>${r.vs?`<span class="dist-c-vs">${r.vs}</span>`:""}<b>${r.r||""}</b></div>`).join("")}</div>`).join("")}`}
function renderDJs(){const filtered=DJS.filter(d=>{if(djFilter&&!d.n.toLowerCase().includes(djFilter.toLowerCase())&&!(d.note||"").toLowerCase().includes(djFilter.toLowerCase()))return false;if(djTempFilter&&!d.t.includes(djTempFilter))return false;return true});const html=`<div class="banner banner-g"><b>Mapa de DJs.</b> ${DJS.length} DJs principales con sus cuadros y temperaturas dominantes. Filtra por nombre o temperatura.</div><input class="search-input" placeholder="Buscar por nombre o nota..." value="${djFilter}" oninput="djFilter=this.value;renderDJs()"><div class="filter-row"><button class="chip ${!djTempFilter?'on':''}" onclick="djTempFilter='';renderDJs()">Todos</button><button class="chip ${djTempFilter==='calido'?'on':''}" onclick="djTempFilter='calido';renderDJs()" style="${djTempFilter==='calido'?'':'color:var(--calido)'}">🟠 Cálido</button><button class="chip ${djTempFilter==='frio'?'on':''}" onclick="djTempFilter='frio';renderDJs()" style="${djTempFilter==='frio'?'':'color:var(--frio)'}">⚪ Frío</button><button class="chip ${djTempFilter==='oscuro'?'on':''}" onclick="djTempFilter='oscuro';renderDJs()" style="${djTempFilter==='oscuro'?'':'color:var(--oscuro)'}">⚫ Oscuro</button></div>${filtered.length===0?'<div class="empty">Sin resultados</div>':filtered.map(d=>{const cuadrosPills=d.c.map(id=>`<span class="cu-pill" style="${pillStyle(CUADROS[id]?.tempColor||'')}">${id}</span>`).join(" ");const tempPills=d.t.map(t=>`<span class="cu-pill ${t}">${TEMP_DEF[t].icon} ${TEMP_DEF[t].label}</span>`).join(" ");return `<div class="card2"><div style="font-size:15px;font-weight:800;margin-bottom:6px">${d.n}</div><div style="margin-bottom:6px">${cuadrosPills} ${tempPills}</div>${d.note?`<div style="font-size:12px;color:var(--tx3);line-height:1.5">${d.note}</div>`:""}</div>`}).join("")}`;document.getElementById("main").innerHTML=html}
function renderGenres(){const filtered=GENEROS.filter(g=>{if(genFilter&&!g.g.toLowerCase().includes(genFilter.toLowerCase())&&!(g.d||"").toLowerCase().includes(genFilter.toLowerCase()))return false;if(genTempFilter&&!g.t.includes(genTempFilter))return false;return true});const html=`<div class="banner banner-g"><b>Mapa de géneros.</b> ${GENEROS.length} géneros mapeados a sus cuadros y temperaturas dominantes. Filtra por nombre o temperatura.</div><input class="search-input" placeholder="Buscar género..." value="${genFilter}" oninput="genFilter=this.value;renderGenres()"><div class="filter-row"><button class="chip ${!genTempFilter?'on':''}" onclick="genTempFilter='';renderGenres()">Todos</button><button class="chip ${genTempFilter==='calido'?'on':''}" onclick="genTempFilter='calido';renderGenres()">🟠 Cálido</button><button class="chip ${genTempFilter==='frio'?'on':''}" onclick="genTempFilter='frio';renderGenres()">⚪ Frío</button><button class="chip ${genTempFilter==='oscuro'?'on':''}" onclick="genTempFilter='oscuro';renderGenres()">⚫ Oscuro</button></div>${filtered.length===0?'<div class="empty">Sin resultados</div>':filtered.map(g=>{const cuadrosPills=g.c.map(id=>`<span class="cu-pill" style="${pillStyle(CUADROS[id]?.tempColor||'')}">${id}</span>`).join(" ");const tempPills=g.t.map(t=>`<span class="cu-pill ${t}">${TEMP_DEF[t].icon}</span>`).join(" ");return `<div class="card2"><div style="font-size:14.5px;font-weight:800;margin-bottom:6px">${g.g}</div><div style="margin-bottom:6px">${cuadrosPills} ${tempPills}</div>${g.d?`<div style="font-size:12px;color:var(--tx3);line-height:1.5">${g.d}</div>`:""}</div>`}).join("")}`;document.getElementById("main").innerHTML=html}
function renderRoutes(){document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>Rutas típicas de set DJ.</b> Flujos habituales entre cuadros para distintos contextos. Las flechas indican el orden temporal.</div>${RUTAS.map(r=>`<div class="route-c"><div class="route-c-t">${r.t}</div><div class="route-c-flow">${r.flow}</div><div class="route-c-d">${r.d}</div></div>`).join("")}`}
function renderExc(){document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>Casos especiales y excepciones.</b> Situaciones que no encajan en el flujo simple del clasificador y que el sistema maneja con flexibilidad.</div>${EXCEPCIONES.map(e=>`<div class="exc-c"><div class="exc-c-h">${e.h}</div><div class="exc-c-d">${e.d}</div></div>`).join("")}`}
function renderRules(){document.getElementById("main").innerHTML=`<div class="banner banner-g"><b>Reglas operativas del sistema.</b> Cómo funciona cirujano en la práctica con Apple Music y al pinchar.</div>${REGLAS.map(r=>`<div class="pri"><div class="pri-n">${r.n}</div><div class="pri-t">${r.t}</div><div class="pri-d">${r.d}</div></div>`).join("")}`}
function onGlobalSearch(q){searchQuery=q.trim().toLowerCase();if(!searchQuery){if(tab!=="home")showTab(tab);else renderHome();return}const results=[];Object.entries(CUADROS).forEach(([id,C])=>{const txt=(id+" "+C.n+" "+C.short+" "+C.intro+" "+C.detalle+" "+C.djs+" "+C.lugares+" "+(C.explicacion||"")).toLowerCase();if(txt.includes(searchQuery))results.push({cat:"Cuadro",t:`${id} · ${C.n}`,d:C.short,act:`showCuadroDetail('${id}')`})});DJS.forEach(d=>{const txt=(d.n+" "+(d.note||"")+" "+d.c.join(" ")).toLowerCase();if(txt.includes(searchQuery))results.push({cat:"DJ",t:d.n,d:`${d.c.join(", ")} · ${d.note||""}`,act:""})});GENEROS.forEach(g=>{const txt=(g.g+" "+(g.d||"")+" "+g.c.join(" ")).toLowerCase();if(txt.includes(searchQuery))results.push({cat:"Género",t:g.g,d:`${g.c.join(", ")} · ${g.d||""}`,act:""})});DISTINCIONES.forEach(d=>{const txt=(d.h+" "+d.rows.map(r=>(r.l||"")+(r.r||"")).join(" ")).toLowerCase();if(txt.includes(searchQuery))results.push({cat:"Distinción",t:d.h,d:d.rows.map(r=>(r.l||"")+(r.vs?" "+r.vs+" ":"")+(r.r||"")).join(" · "),act:""})});RUTAS.forEach(r=>{const txt=(r.t+" "+r.flow+" "+r.d).toLowerCase();if(txt.includes(searchQuery))results.push({cat:"Ruta",t:r.t,d:r.flow,act:""})});EXCEPCIONES.forEach(e=>{const txt=(e.h+" "+e.d).toLowerCase();if(txt.includes(searchQuery))results.push({cat:"Excepción",t:e.h,d:e.d.replace(/<[^>]+>/g,"").substring(0,140)+"...",act:""})});REGLAS.forEach(r=>{const txt=(r.t+" "+r.d).toLowerCase();if(txt.includes(searchQuery))results.push({cat:"Regla",t:r.t,d:r.d,act:""})});const html=`<div class="banner banner-g"><b>Resultados para "${q}":</b> ${results.length} encontrados</div>${results.length===0?'<div class="empty">Sin resultados. Prueba otro término.</div>':results.map(r=>`<div class="search-r" ${r.act?`onclick="${r.act}"`:""}><div class="search-r-cat">${r.cat}</div><div class="search-r-t">${r.t}</div><div class="search-r-d">${r.d}</div></div>`).join("")}`;document.getElementById("main").innerHTML=html;window.scrollTo({top:0})}
renderHome();
</script>
</body>
</html>
