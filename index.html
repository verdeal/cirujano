<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cirujano v6 — Clasificador definitivo</title>
<style>
:root{
  --bg:#0A0A0F;--card:#14141C;--card2:#1C1C26;--brd:#2A2A38;
  --tx:#F0F0F5;--tx2:#C0C0CC;--tx3:#9090A0;--tx4:#606070;
  --green:#34D399;--red:#EF4444;--amber:#F59E0B;--blue:#3B82F6;
  --calido:#F97316;--frio:#7CD4F4;--oscuro:#A78BFA;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overscroll-behavior:none}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.app{max-width:720px;margin:0 auto;padding:18px 14px 40px}

/* Header */
.hd{text-align:center;margin-bottom:16px;padding:8px 0}
.hd-t{font-size:11px;letter-spacing:3px;color:var(--tx4);font-weight:700;margin-bottom:5px}
.hd-n{font-size:22px;font-weight:800;color:var(--tx);letter-spacing:-0.3px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--card2);padding:4px;border-radius:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:10px 8px;text-align:center;font-size:12px;font-weight:700;color:var(--tx3);background:none;border:none;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;min-width:80px}
.tab.on{background:var(--card);color:var(--tx)}

/* Progress dots */
.pg{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.pg-d{width:8px;height:8px;border-radius:50%;background:var(--brd);transition:.2s}
.pg-d.on{background:var(--green);transform:scale(1.4)}
.pg-d.done{background:var(--green);opacity:.5}

/* Question card */
.q{background:var(--card);border:1px solid var(--brd);border-radius:18px;padding:18px 16px;margin-bottom:14px}
.q-num{font-size:11px;letter-spacing:2px;color:var(--tx4);font-weight:700;margin-bottom:8px}
.q-t{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:8px;line-height:1.3}
.q-s{font-size:13.5px;color:var(--tx2);margin-bottom:16px;line-height:1.6}
.q-s b{color:var(--tx);font-weight:700}

/* Options */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--card2);border:1.5px solid var(--brd);border-radius:14px;padding:14px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;text-align:left;color:var(--tx);font-family:inherit;font-size:14px;width:100%;transition:.15s}
.opt:active{transform:scale(.98);background:var(--brd)}
.opt-ic{font-size:24px;flex-shrink:0;line-height:1;width:32px;text-align:center}
.opt-bd{flex:1;min-width:0}
.opt-l{font-weight:800;color:var(--tx);margin-bottom:5px;font-size:15px;line-height:1.3}
.opt-d{font-size:13px;color:var(--tx2);line-height:1.5}
.opt-d b{color:var(--tx);font-weight:700}
.opt-ex{font-size:11.5px;color:var(--tx3);line-height:1.5;margin-top:6px;padding-top:6px;border-top:1px solid var(--brd)}
.opt-ex b{color:var(--tx2)}

/* Back/buttons */
.back{background:none;border:none;color:var(--tx3);font-family:inherit;font-size:14px;padding:10px;cursor:pointer;margin-top:10px;display:block;width:100%;text-align:center}
.back:active{color:var(--tx)}
.btn{padding:14px;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;border:1.5px solid var(--brd);background:var(--card);color:var(--tx);width:100%;margin-top:10px}
.btn-pri{background:var(--green);color:#0A0A0F;border-color:var(--green)}
.btn-pri:active{transform:scale(.98)}

/* Result */
.res{background:var(--card);border-radius:20px;padding:20px 16px;margin-bottom:14px;border:2px solid var(--brd)}
.res.primary{border-color:var(--green)}
.res.secondary{border-color:var(--amber);opacity:.95}
.res-tag{font-size:10px;letter-spacing:2px;font-weight:800;margin-bottom:8px;text-transform:uppercase}
.res.primary .res-tag{color:var(--green)}
.res.secondary .res-tag{color:var(--amber)}
.res-id{display:inline-block;padding:4px 10px;border-radius:6px;background:var(--card2);font-size:13px;font-weight:800;margin-right:8px;letter-spacing:1px}
.res-id.calido{background:rgba(249,115,22,.18);color:var(--calido)}
.res-id.frio{background:rgba(124,212,244,.18);color:var(--frio)}
.res-id.oscuro{background:rgba(167,139,250,.18);color:var(--oscuro)}
.res-id.mixto{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(124,212,244,.15));color:var(--tx)}
.res-n{font-size:20px;font-weight:800;color:var(--tx);margin-bottom:6px;line-height:1.25}
.res-temp{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;font-size:13px;font-weight:800;margin-bottom:14px}
.res-temp.calido{background:rgba(249,115,22,.15);color:var(--calido)}
.res-temp.frio{background:rgba(124,212,244,.15);color:var(--frio)}
.res-temp.oscuro{background:rgba(167,139,250,.15);color:var(--oscuro)}
.res-d{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:14px;font-style:italic;padding-left:10px;border-left:2px solid var(--brd)}
.res-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--brd)}
.res-section-t{font-size:10px;letter-spacing:1.5px;color:var(--tx4);font-weight:800;margin-bottom:8px;text-transform:uppercase}
.res-meta{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:6px}
.res-meta b{color:var(--tx);font-weight:700}

/* Validation */
.val{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:12px;margin-top:12px}
.val-t{font-size:10px;letter-spacing:1.5px;color:var(--amber);font-weight:800;margin-bottom:8px}
.val-q{font-size:13px;color:var(--tx);margin-bottom:8px;line-height:1.55;padding-left:18px;position:relative}
.val-q:before{content:"✓";position:absolute;left:0;color:var(--green);font-weight:700}

/* Trail */
.trail{background:var(--card2);border-radius:12px;padding:12px;margin-top:12px;font-size:11px;color:var(--tx3);line-height:1.7}
.trail b{color:var(--tx2)}

/* Lista browser */
.lst{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
.lst:active{background:var(--card2)}
.lst-id{padding:5px 10px;border-radius:6px;font-size:13px;font-weight:800;letter-spacing:1px;flex-shrink:0;min-width:42px;text-align:center}
.lst-bd{flex:1;min-width:0}
.lst-n{font-weight:800;color:var(--tx);margin-bottom:3px;font-size:15px}
.lst-d{font-size:12.5px;color:var(--tx3);line-height:1.45}
.section-h{font-size:11px;letter-spacing:2px;color:var(--green);font-weight:800;margin:18px 0 10px;text-transform:uppercase}
.section-h:first-child{margin-top:0}

/* Intro/help */
.intro{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.25);border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px;color:var(--tx2);line-height:1.6}
.intro b{color:var(--green)}

.warning-banner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--tx2);line-height:1.55}
.warning-banner b{color:var(--amber)}

.multi-hdr{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px;color:var(--tx2);line-height:1.6;text-align:center}
.multi-hdr b{color:var(--amber)}

/* Temperature picker - shows ALL 3 temperatures with relative context per cuadro */
.temp-pick{background:var(--card2);border:1.5px solid var(--brd);border-radius:14px;padding:14px;cursor:pointer;text-align:left;color:var(--tx);font-family:inherit;width:100%;font-size:14px;margin-bottom:10px;transition:.15s}
.temp-pick:active{transform:scale(.98)}
.temp-pick.calido{border-color:rgba(249,115,22,.4)}
.temp-pick.frio{border-color:rgba(124,212,244,.4)}
.temp-pick.oscuro{border-color:rgba(167,139,250,.4)}
.temp-pick.rare{opacity:0.85}
.temp-pick-h{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.temp-pick-h-ic{font-size:20px}
.temp-pick-h-l{font-weight:800;font-size:15px}
.temp-pick-h-l.calido{color:var(--calido)}
.temp-pick-h-l.frio{color:var(--frio)}
.temp-pick-h-l.oscuro{color:var(--oscuro)}
.temp-pick-rare-tag{display:inline-block;padding:2px 8px;border-radius:6px;background:rgba(245,158,11,.18);color:var(--amber);font-size:10px;font-weight:700;letter-spacing:.5px}
.temp-pick-def{font-size:13px;color:var(--tx);line-height:1.5;margin-bottom:8px}
.temp-pick-ctx{font-size:12px;color:var(--tx2);line-height:1.55;padding:8px 10px;background:var(--card);border-radius:8px;margin-top:6px}
.temp-pick-ctx b{color:var(--tx)}

/* Energy picker */
.energy-pick{background:var(--card2);border:1.5px solid var(--brd);border-radius:14px;padding:14px;cursor:pointer;text-align:left;color:var(--tx);font-family:inherit;width:100%;font-size:14px;margin-bottom:10px;transition:.15s}
.energy-pick:active{transform:scale(.98)}
.energy-pick-h{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.energy-pick-l{font-weight:800;font-size:15px;color:var(--tx)}
.energy-pick-d{font-size:13px;color:var(--tx2);line-height:1.5}

/* Reference page */
.ref-card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:18px;margin-bottom:14px}
.ref-card-h{font-size:11px;letter-spacing:2px;color:var(--green);font-weight:800;margin-bottom:10px;text-transform:uppercase}
.ref-card-t{font-size:18px;font-weight:800;margin-bottom:8px}
.ref-card-d{font-size:13.5px;color:var(--tx2);line-height:1.65;margin-bottom:10px}
.ref-card-d b{color:var(--tx)}

.principle-row{display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:var(--tx2);line-height:1.55}
.principle-num{font-weight:800;color:var(--green);min-width:22px;flex-shrink:0}

/* Mecanismos */
.mech{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:8px}
.mech-h{font-weight:800;font-size:13px;margin-bottom:4px;color:var(--tx)}
.mech-h.arriba{color:var(--green)}
.mech-h.horiz{color:var(--frio)}
.mech-h.abajo{color:var(--oscuro)}
.mech-d{font-size:12.5px;color:var(--tx2);line-height:1.55}
.mech-d b{color:var(--tx)}

/* Matrix */
.matrix-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:12px}
table.matrix{width:100%;border-collapse:collapse;font-size:11px}
.matrix th{text-align:left;padding:7px 5px;color:var(--tx3);font-weight:700;font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--brd)}
.matrix td{padding:6px 5px;border-bottom:1px solid var(--brd);color:var(--tx2);vertical-align:top}
.matrix td.id{font-weight:800;font-family:monospace;font-size:11px;background:var(--card2);text-align:center}
.matrix td.name{font-weight:700;color:var(--tx);font-size:11.5px}
.matrix .has{color:var(--green);font-weight:700}
.matrix .min{color:var(--tx3);font-size:10.5px}
.matrix .rare{color:var(--amber);font-size:10.5px}

/* Dist card */
.dist-c{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:10px}
.dist-c-h{font-weight:800;color:var(--tx);margin-bottom:8px;font-size:14px}
.dist-c-row{display:flex;flex-wrap:wrap;gap:8px;font-size:13px;color:var(--tx2);line-height:1.55;margin-bottom:5px}
.dist-c-row b{color:var(--tx)}
.dist-c-vs{color:var(--amber);font-weight:800}
</style>
</head>
<body>
<div class="app">

<div class="hd">
  <div class="hd-t">CIRUJANO V6 · CLASIFICADOR DEFINITIVO</div>
  <div class="hd-n">¿Dónde va este track?</div>
</div>

<div class="tabs">
  <button class="tab on" id="tab-clas" onclick="showTab('clas')">Clasificar</button>
  <button class="tab" id="tab-list" onclick="showTab('list')">Listas</button>
  <button class="tab" id="tab-ref" onclick="showTab('ref')">Sistema</button>
</div>

<div id="main"></div>

</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// CUADROS — letras A-M reasignadas por flujo natural
// Cada cuadro tiene las 3 temperaturas relativas (siempre se ofrecen las 3,
// con marca rare cuando sea poco habitual pero NUNCA imposible)
// Vocabulario: PRINCIPAL y PICO (no Sostén)
// ═══════════════════════════════════════════════════════════════════════════

const CUADROS = {
  A: {
    tipo:'escucha', icon:'🌅',
    n:"Cafe del Mar",
    short:"Atardecer balearic — escucha mecedora",
    intro:"Atardecer en terraza mediterránea con copa al sol cayendo. La música acompaña la conversación, el mar de fondo, la luz dorada. NO se baila activamente — el cuerpo se mueve poco o nada.",
    detalle:"Balearic clásico, ambient cálido, cosmic disco relajado, downtempo Bonobo, lo-fi atmosférico, chillwave. Producción suave sin kicks contundentes. Funciona como apertura de día (warm up de pool, festival selecto al aire libre) o como salida emocional de pre-cierre.",
    djs:"José Padilla · DJ Harvey relajado · Caribou 'Sun' · Lane 8 luminoso · Bonobo · cosmic disco Baldelli relajado · Lindstrøm extendido",
    lugares:"Cafe Mambo Ibiza · terrazas mediterráneas · sunset sets · apertura festival al aire libre · brunch chill",
    bpm:"100-122 BPM",
    cuerpo:"Arriba-estático (cabeza alta, copa en mano, casi quieto)",
    tempColor:"calido",
    energias:["principal"],  // solo principal (no baile activo, no peak)
    temps:{
      calido:{
        rare:false,
        def:"Temperatura natural y dominante. Calor humano elegante mediterráneo con leads largos amables y percusión orgánica relajada.",
        examples:"José Padilla, DJ Harvey relajado, Caribou 'Sun', Lane 8 luminoso, Bonobo 'Migration', Floating Points luminoso, Lindstrøm extendido"
      },
      frio:{
        rare:true,
        def:"Balearic con leads sintéticos distantes, cosmic disco con producción más fría. Bailable suavísimo o atmosférico sin calor humano explícito.",
        examples:"Caribou 'Odessa' modo cosmic, cosmic disco Baldelli más distante, ambient sintético mediterráneo, Lone modo cosmic"
      },
      oscuro:{
        rare:true,
        def:"Atardecer melancólico que retuerce un poco, balearic más nostálgico denso. No es Lloroso (M) — sigue siendo atardecer, pero con sombra de despedida.",
        examples:"Penguin Cafe Orchestra modo nostálgico, Ultramarine, balearic melancólico, ambient con peso pero al aire libre"
      }
    },
    test:[
      "¿BPM 100-122 sin kick contundente?",
      "¿Lo pondrías al atardecer en terraza con copa, sin que nadie baile fuerte?",
      "¿Si lo subes a 130 BPM perdería su gracia atmosférica?"
    ]
  },
  B: {
    tipo:'nuclear', icon:'🏖️',
    n:"DC10 Terraza",
    short:"Pool / día abierto — social alegre",
    intro:"Pool party Ibiza, brunch electrónico, barco verano un día de calor. Sol o noche en barco — lo que define es la GENTE: público mixto, copa en mano, hits que rebotan, alegría sin oscuridad. La gente baila feliz sin juzgar la música.",
    detalle:"Disco-house, soulful house feliz, funky, nu-disco bailable, French touch alegre, Latin house feliz, jackin house. Vocales reconocibles, riffs claros, melodía amable. Defected y Glitterbox son los sellos referencia.",
    djs:"Folamour · Honey Dijon · Purple Disco Machine · Crackazat · Roger Sanchez · Bob Sinclar · Defected residents · Dimitri From Paris · Sandy Rivera",
    lugares:"DC10 Terraza · Glitterbox Hï · Defected Croatia · O Beach Ibiza · pool parties · brunch electrónico · barcos verano",
    bpm:"118-126 BPM",
    cuerpo:"En pista-ligero (bailas con copa en mano, sin sudor extremo)",
    tempColor:"calido",
    energias:["principal","pico"],
    temps:{
      calido:{
        rare:false,
        def:"Temperatura natural y dominante. Vocal feliz, piano, riff alegre, percusión orgánica, melodía amable.",
        examples:"Folamour 'The Power', Honey Dijon hits, Defected/Glitterbox residents hits, Crackazat, Purple Disco Machine, Latin house feliz, French touch"
      },
      frio:{
        rare:true,
        def:"Pool con producción más mecánica o sintética sin calor humano cálido pero todavía bailable feliz. Acid house clásico, electro funk distanciado.",
        examples:"Phuture acid lado feliz, electro funk Egyptian Lover bailable, algún Daft Punk frío, Mr Oizo modo pool"
      },
      oscuro:{
        rare:true,
        def:"Disco-house con riff oscuro o vocal melancólico DENTRO del ambiente alegre. Track de pool con sombra puntual sin romper la fiesta.",
        examples:"Honey Dijon más serio, disco-house con vocal triste, algún Folamour modo melancólico, soul house con riff oscuro"
      }
    },
    test:[
      "¿Hay vocal o riff que cualquier persona en pool reconoce?",
      "¿Lo pondrías en brunch domingo 14h o barco verano?",
      "¿La gente sonríe sin tener que entender de música?"
    ]
  },
  C: {
    tipo:'nuclear', icon:'🏔️',
    n:"Elétrico Fest Porto",
    short:"Festival selecto outdoor — pureta bailongo",
    intro:"Festival al aire libre en monte o naturaleza, capacidad 800-3000 personas. Atardecer y noche. La gente paga la entrada por la SELECCIÓN del DJ — saben que viene Kerri Chandler, Garnier, Larry Heard. Bailan pero también valoran lo que suena.",
    detalle:"Chicago house antiguo extendido, soulful elegante, Detroit emocional narrativo, cosmic disco serio, balearic bailable, Afro house narrativo. Versiones extendidas no hits. Tracks largos (8-12 min) con clase. Sonrisas y conversaciones, no club cerrado oscuro.",
    djs:"Kerri Chandler en monte · Larry Heard extended · Theo Parrish · Garnier modo serio · Black Coffee narrativo · DJ Harvey serio · Moodymann elegante · Ron Trent extended",
    lugares:"Elétrico Fest Porto · Lilás Lisboa monte · festivales boutique outdoor · Sunsetstrip Mendoza · backyard festivals selectos",
    bpm:"116-126 BPM",
    cuerpo:"En pista-consciente (bailas pero también valoras)",
    tempColor:"calido",
    energias:["principal","pico"],
    temps:{
      calido:{
        rare:false,
        def:"Temperatura natural y dominante. Calor humano elegante, vocal o piano emotivo, melodía con clase.",
        examples:"Kerri Chandler 'Bar A Thym', Larry Heard 'Mystery of Love' extended, Garnier 'Acid Eiffel', Detroit emocional Carl Craig, Caribou 'Odessa', Moodymann elegante"
      },
      frio:{
        rare:false,
        def:"Synth distante elegante, retro Carpenter, producción seca elegante. Existe minoritario.",
        examples:"A Sagittariun 'Vanishing Point', Italo moderno serio Tensnake, cosmic indie dance Lena Willikens, Garnier modo synth seco"
      },
      oscuro:{
        rare:true,
        def:"Detroit techno cósmico nocturno tarde con sombra, Mind Against narrativo cuando entra noche cerrada. Lilás se vuelve nocturno.",
        examples:"Detroit techno cósmico oscuro Carl Craig nocturno, Mind Against narrativo, Adriatique modo dark, Tale of Us en versión Lilás"
      }
    },
    test:[
      "¿Es versión EXTENDIDA o B-side, no un hit que también suena en pool?",
      "¿La gente vendría aquí por la SELECCIÓN del DJ y no solo por ambiente?",
      "¿Te imaginas el track con monte detrás y atardecer cayendo?"
    ]
  },
  WC: {
    tipo:'warmup', icon:'🌊',
    n:"Warm up Cálido",
    short:"Apertura abierta — saco transversal laxo",
    intro:"Saco LAXO de aperturas con calor humano. Sirve para abrir cualquier cuadro luminoso/social. Tracks bailables suaves, deep house elegante apertura, soulful apertura, balearic bailable. NO engancha aún la pista — prepara el viaje cálido.",
    detalle:"Para abrir B (DC10 Terraza), C (Elétrico Fest), D (DC10 Circoloco primera hora), H (Sunwaves apertura). Tracks largos con muy poca evolución, leads cálidos, percusión sutil, kick presente pero no contundente.",
    djs:"Brian Cid lento · Cattaneo warm up · Hraach con melodía · Larry Heard apertura · Lane 8 apertura · Cid Inc cálido · Edu Imbernon",
    lugares:"warm up para pool · apertura festival selecto · primera hora club caliente · primera hora sesión larga",
    bpm:"116-124 BPM",
    cuerpo:"Variable según hora del set (entrada al cuadro)",
    tempColor:"calido",
    energias:["apertura"],
    temps:{
      calido:{
        rare:false,
        def:"Apertura cálida pura. Calor humano emocional con leads largos amables. La temperatura natural del warm up cálido.",
        examples:"Brian Cid 'Light In The Lotus' modo apertura, Cattaneo emocional lento, Hraach melódico, deep house elegante apertura"
      },
      frio:{
        rare:true,
        def:"Apertura cálida pero con producción más distante, leads más sintéticos dentro de la calidez general. Cattaneo modo más sintético.",
        examples:"Cattaneo apertura más distante, Edu Imbernon synth, deep tech con calor residual"
      },

// ═══════════════════════════════════════════════════════════════════════════
// STATE & RENDER
// ═══════════════════════════════════════════════════════════════════════════

let state = {node:"start", path:[], trail:[], resultCuadros:null, temp:null, energy:null};
let tab = "clas";

function showTab(t){
  tab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById("tab-"+t).classList.add("on");
  if(t==="clas") render();
  else if(t==="list") renderListBrowser();
  else renderReference();
}

function reset(){
  state = {node:"start", path:[], trail:[], resultCuadros:null, temp:null, energy:null};
  render();
}

function pick(next, label){
  state.trail.push({q:TREE[state.node]?.q || "", a:label});
  state.path.push(state.node);
  if(typeof next==="object" && next.cuadro){
    state.resultCuadros=[next.cuadro];
    renderTemperaturaSelector();
    return;
  }
  if(TREE[next] && TREE[next].multi){
    state.resultCuadros=TREE[next].multi;
    renderTemperaturaSelector();
    return;
  }
  state.node=next;
  render();
}

function back(){
  if(state.energy){state.energy=null; renderEnergiaSelector(); return;}
  if(state.temp){state.temp=null; renderTemperaturaSelector(); return;}
  if(state.resultCuadros){
    state.resultCuadros=null;
    state.node=state.path.pop();
    state.trail.pop();
    render();
    return;
  }
  if(state.path.length===0) return;
  state.node=state.path.pop();
  state.trail.pop();
  render();
}

// ─── PREGUNTA ───
function render(){
  if(tab!=="clas") return;
  const node=TREE[state.node];
  if(!node) return;
  const totalDepth=4;
  const dots=[];
  for(let i=0;i<totalDepth;i++){
    const cls=i<state.path.length?"done":(i===state.path.length?"on":"");
    dots.push(`<div class="pg-d ${cls}"></div>`);
  }
  const opts=node.opts.map(o=>`
    <button class="opt" onclick='pick(${JSON.stringify(o.next)},${JSON.stringify(o.l)})'>
      <div class="opt-ic">${o.ic}</div>
      <div class="opt-bd">
        <div class="opt-l">${o.l}</div>
        <div class="opt-d">${o.d}</div>
        ${o.ex?`<div class="opt-ex">${o.ex}</div>`:""}
      </div>
    </button>
  `).join("");
  const trailHtml=state.trail.length?`<div class="trail">${state.trail.map(t=>`<div><b>${t.q.replace(/<[^>]+>/g,'')}</b> → ${t.a}</div>`).join("")}</div>`:"";
  const isFirst=state.node==="start";
  const intro=isFirst?`<div class="intro"><b>Cómo funciona el clasificador:</b><br>Preguntas técnicas → 1 o 2 cuadros (escenas) → temperatura contextualizada en ese cuadro → energía (principal o pico) → ficha completa con DJs, lugares, BPM, validación.</div>`:"";
  document.getElementById("main").innerHTML=`
    <div class="pg">${dots.join("")}</div>
    ${intro}
    <div class="q">
      <div class="q-num">PREGUNTA ${state.path.length+1}</div>
      <div class="q-t">${node.q}</div>
      ${node.s?`<div class="q-s">${node.s}</div>`:""}
      <div class="opts">${opts}</div>
    </div>
    ${state.path.length>0?`<button class="back" onclick="back()">← Atrás</button>`:""}
    ${trailHtml}
  `;
  window.scrollTo({top:0});
}

// ─── TEMPERATURA ───
function renderTemperaturaSelector(){
  const cuadros=state.resultCuadros;
  const isMulti=cuadros.length>1;

  const cuadrosInfo=cuadros.map((id,i)=>{
    const C=CUADROS[id];
    return `
      <div class="res ${i===0?'primary':'secondary'}">
        <div class="res-tag">${i===0?'CUADRO PRINCIPAL':'TAMBIÉN PODRÍA SER'}</div>
        <div><span class="res-id ${C.tempColor}">${id}</span></div>
        <div class="res-n" style="margin-top:6px">${C.icon} ${C.n}</div>
        <div class="res-d">${C.intro}</div>
      </div>
    `;
  }).join("");

  const tempOptions=[
    {id:'calido', ic:'🟠', l:'Cálido'},
    {id:'frio', ic:'⚪', l:'Frío'},
    {id:'oscuro', ic:'⚫', l:'Oscuro'}
  ];

  const tempCards=tempOptions.map(t=>{
    // Compute if rare in any of the cuadros
    const anyRare=cuadros.some(cid=>CUADROS[cid].temps[t.id].rare);
    const ctxBlocks=cuadros.map(cid=>{
      const C=CUADROS[cid];
      const ctx=C.temps[t.id];
      const rareTag=ctx.rare?`<span class="temp-pick-rare-tag">RARO PERO POSIBLE</span>`:'';
      return `
        <div class="temp-pick-ctx">
          <b>En ${cid} ${C.n}:</b> ${rareTag}<br>
          ${ctx.def}
          ${ctx.examples?`<br><br><b>Ejemplos:</b> ${ctx.examples}`:""}
        </div>
      `;
    }).join("");
    return `
      <button class="temp-pick ${t.id} ${anyRare?'rare':''}" onclick='pickTemp(${JSON.stringify(t.id)})'>
        <div class="temp-pick-h">
          <div class="temp-pick-h-ic">${t.ic}</div>
          <div class="temp-pick-h-l ${t.id}">${t.l.toUpperCase()}</div>
        </div>
        ${ctxBlocks}
      </button>
    `;
  }).join("");

  const multiHdr=isMulti?`<div class="multi-hdr"><b>Este track puede ir a ${cuadros.length} cuadros simultáneamente.</b><br>Apple Music permite duplicación — el track vivirá en ambas listas con la misma temperatura.</div>`:"";

  document.getElementById("main").innerHTML=`
    ${multiHdr}
    ${cuadrosInfo}
    <div class="q" style="margin-top:14px">
      <div class="q-num">PASO 2 · TEMPERATURA</div>
      <div class="q-t">¿Qué TEMPERATURA tiene el track?</div>
      <div class="q-s">La temperatura es <b>relativa al cuadro</b> — significa cosas distintas en cada uno. <b>Cálido = humano</b>. <b>Frío = mecánico (te ignora)</b>. <b>Oscuro = sombra (te presiona)</b>. Lee los bloques contextuales de cada cuadro. Las opciones marcadas como <b>RARO</b> son menos habituales pero válidas para matices.</div>
      ${tempCards}
    </div>
    <button class="back" onclick="back()">← Atrás (cambiar cuadro)</button>
  `;
  window.scrollTo({top:0});
}

function pickTemp(temp){
  state.temp=temp;
  // Check if all cuadros have only one energy option ("principal" or "apertura")
  const allSimple=state.resultCuadros.every(id=>CUADROS[id].energias.length===1);
  if(allSimple){
    state.energy=CUADROS[state.resultCuadros[0]].energias[0];
    renderResult();
  } else {
    renderEnergiaSelector();
  }
}

// ─── ENERGIA ───
function renderEnergiaSelector(){
  const cuadros=state.resultCuadros;
  const C=CUADROS[cuadros[0]]; // assume main cuadro for energy options

  // Check what energy options exist across the cuadros
  const energyOptions=[];
  if(C.energias.includes("principal")){
    energyOptions.push({
      id:"principal", l:"PRINCIPAL", d:"La energía base del cuadro, donde puedes estar 1 hora sin cambio. Sostiene el cuadro sin romper."
    });
  }
  if(C.energias.includes("pico")){
    energyOptions.push({
      id:"pico", l:"PICO", d:"El clímax dentro del cuadro. Track de rotura, peak rotundo, momento álgido."
    });
  }
  if(C.energias.includes("apertura")){
    energyOptions.push({
      id:"apertura", l:"APERTURA", d:"Track de inicio que prepara el cuadro. Los warm ups son siempre apertura."
    });
  }

  const cards=energyOptions.map(e=>`
    <button class="energy-pick" onclick='pickEnergy(${JSON.stringify(e.id)})'>
      <div class="energy-pick-h">
        <div class="energy-pick-l">${e.l}</div>
      </div>
      <div class="energy-pick-d">${e.d}</div>
    </button>
  `).join("");

  document.getElementById("main").innerHTML=`
    <div class="q">
      <div class="q-num">PASO 3 · ENERGÍA</div>
      <div class="q-t">¿Es PRINCIPAL o PICO?</div>
      <div class="q-s">Dentro del cuadro <b>${C.n}</b>, la energía indica el momento del set. <b>Principal</b> = sostén del cuadro, te puedes quedar ahí 1 hora. <b>Pico</b> = clímax, momento álgido, rotura.</div>
      ${cards}
    </div>
    <button class="back" onclick="back()">← Atrás (cambiar temperatura)</button>
  `;
  window.scrollTo({top:0});
}

function pickEnergy(e){
  state.energy=e;
  renderResult();
}

// ─── RESULTADO ───
function renderResult(){
  const cuadros=state.resultCuadros;
  const temp=state.temp;
  const energy=state.energy;
  const isMulti=cuadros.length>1;
  const tempLabel={calido:"🟠 CÁLIDO",frio:"⚪ FRÍO",oscuro:"⚫ OSCURO"}[temp];
  const tempClass=temp;

  const cards=cuadros.map((id,i)=>{
    const C=CUADROS[id];
    const cls=i===0?"res primary":"res secondary";
    const tag=i===0?(isMulti?"CUADRO PRINCIPAL":"DIAGNÓSTICO"):"TAMBIÉN VIVE EN";
    const tempCtx=C.temps[temp];
    const rareWarning=tempCtx.rare?`<div class="warning-banner" style="margin-bottom:14px"><b>⚠ Temperatura inusual en este cuadro:</b> es válida y útil para matices, pero no es la temperatura natural. Verifica con los tests al final.</div>`:'';
    return `
      <div class="${cls}">
        <div class="res-tag">${tag}</div>
        <div><span class="res-id ${C.tempColor}">${id}</span></div>
        <div class="res-n" style="margin-top:6px">${C.icon} ${C.n}</div>
        <div class="res-temp ${tempClass}">${tempLabel}</div>
        <div style="margin-bottom:14px"><b style="color:var(--green);font-size:11px;letter-spacing:1.5px">ENERGÍA: ${energy.toUpperCase()}</b></div>
        ${rareWarning}
        <div class="res-d">${C.intro}</div>

        <div class="res-section">
          <div class="res-section-t">DETALLE TÉCNICO</div>
          <div class="res-meta">${C.detalle}</div>
        </div>

        <div class="res-section">
          <div class="res-section-t">${tempLabel} en ${C.n}</div>
          <div class="res-meta"><b>Definición:</b> ${tempCtx.def}</div>
          ${tempCtx.examples?`<div class="res-meta" style="margin-top:6px"><b>Ejemplos:</b> ${tempCtx.examples}</div>`:""}
        </div>

        <div class="res-section">
          <div class="res-section-t">REFERENCIAS</div>
          <div class="res-meta"><b>📍 Lugares:</b> ${C.lugares}</div>
          <div class="res-meta"><b>🎧 DJs:</b> ${C.djs}</div>
          <div class="res-meta"><b>🎵 BPM:</b> ${C.bpm}</div>
          <div class="res-meta"><b>🧍 Cuerpo:</b> ${C.cuerpo}</div>
          ${C.mecanismo?`<div class="res-meta"><b>⚙️ Mecanismo:</b> ${C.mecanismo}</div>`:""}
        </div>

        <div class="val">
          <div class="val-t">⚠ VALIDACIÓN — comprueba que no has fallado</div>
          ${C.test.map(t=>`<div class="val-q">${t}</div>`).join("")}
        </div>
      </div>
    `;
  }).join("");

  const trailHtml=state.trail.length?`<div class="trail"><b>Camino recorrido:</b><br>${state.trail.map(t=>`<div>${t.q.replace(/<[^>]+>/g,'')} → <b>${t.a}</b></div>`).join("")}</div>`:"";

  const energyLabel=energy.charAt(0).toUpperCase()+energy.slice(1);
  const playlistInstr=`
    <div class="intro" style="margin-top:14px">
      <b>📂 En Apple Music:</b> añade el track a la lista <b>${cuadros.join(' + ')}</b> con etiquetas <b>${temp.toUpperCase()} · ${energyLabel.toUpperCase()}</b>.${isMulti?' Va a las dos listas — duplicación permitida.':''}<br><br>
      Las etiquetas de temperatura y energía van en el campo "comentarios" del track. Formato sugerido: <b>"${temp.charAt(0).toUpperCase()}${energy.charAt(0).toUpperCase()}"</b> (ej: <b>FP</b> = Frío Principal, <b>OPi</b> = Oscuro Pico).
    </div>
  `;

  document.getElementById("main").innerHTML=`
    ${isMulti?`<div class="multi-hdr"><b>Track con duplicación.</b> Vive en ${cuadros.length} cuadros simultáneamente con la misma temperatura y energía.</div>`:""}
    ${cards}
    ${playlistInstr}
    ${trailHtml}
    <button class="btn btn-pri" onclick="reset()">Clasificar otro track</button>
    <button class="back" onclick="back()">← Cambiar energía</button>
  `;
  window.scrollTo({top:0});
}

// ─── LIST BROWSER ───
function renderListBrowser(){
  const groups=[
    {h:"Zona Luz Abierta",ids:["A","B","C"]},
    {h:"Warm up Cálido",ids:["WC"]},
    {h:"Zona Pista Caliente",ids:["D"]},
    {h:"Warm up Frío",ids:["WF"]},
    {h:"Zona Club Selecto",ids:["E","F","G"]},
    {h:"Zona Viaje",ids:["H"]},
    {h:"Warm up Oscuro",ids:["WO"]},
    {h:"Zona Techno Intenso",ids:["I","J","K"]},
    {h:"Zona Ambient Misterioso",ids:["L"]},
    {h:"Zona Cierre",ids:["M"]}
  ];
  const html=groups.map(g=>`
    <div class="section-h">${g.h}</div>
    ${g.ids.map(id=>{
      const C=CUADROS[id];
      return `
        <div class="lst" onclick="showListDetail('${id}')">
          <div class="lst-id ${C.tempColor==='mixto'?'':C.tempColor}" style="background:${C.tempColor==='calido'?'rgba(249,115,22,.18)':C.tempColor==='frio'?'rgba(124,212,244,.18)':C.tempColor==='oscuro'?'rgba(167,139,250,.18)':'var(--card2)'};color:${C.tempColor==='calido'?'var(--calido)':C.tempColor==='frio'?'var(--frio)':C.tempColor==='oscuro'?'var(--oscuro)':'var(--tx)'}">${id}</div>
          <div class="lst-bd">
            <div class="lst-n">${C.icon} ${C.n}</div>
            <div class="lst-d">${C.short}</div>
          </div>
        </div>
      `;
    }).join("")}
  `).join("");
  document.getElementById("main").innerHTML=`
    <div class="intro">
      <b>16 listas en total:</b> 13 cuadros propios (A-M) + 3 warm ups laxos transversales (WC, WF, WO). Cada lista con descripción técnica completa, las 3 temperaturas relativas y energías (principal/pico).
    </div>
    ${html}
  `;
  window.scrollTo({top:0});
}

function showListDetail(id){
  const C=CUADROS[id];
  const tempBlocks=Object.entries(C.temps).map(([k,v])=>{
    const lbl={calido:"🟠 CÁLIDO",frio:"⚪ FRÍO",oscuro:"⚫ OSCURO"}[k];
    const cls=k;
    const rareTag=v.rare?` <span class="temp-pick-rare-tag" style="margin-left:6px">RARO POSIBLE</span>`:'';
    return `
      <div class="res-section">
        <div class="res-section-t" style="color:var(--${cls})">${lbl} en este cuadro${rareTag}</div>
        <div class="res-meta"><b>Definición:</b> ${v.def}</div>
        ${v.examples?`<div class="res-meta" style="margin-top:6px"><b>Ejemplos:</b> ${v.examples}</div>`:""}
      </div>
    `;
  }).join("");
  const energiasText=C.energias.map(e=>e.charAt(0).toUpperCase()+e.slice(1)).join(" · ");
  document.getElementById("main").innerHTML=`
    <div class="res primary">
      <div class="res-tag">${C.tipo==='nuclear'?'CUADRO NUCLEAR':C.tipo==='warmup'?'WARM UP':'CUADRO ESCUCHA'}</div>
      <div><span class="res-id ${C.tempColor}">${id}</span></div>
      <div class="res-n" style="margin-top:6px">${C.icon} ${C.n}</div>
      <div class="res-d">${C.intro}</div>

      <div class="res-section">
        <div class="res-section-t">DETALLE TÉCNICO</div>
        <div class="res-meta">${C.detalle}</div>
      </div>

      <div class="res-section">
        <div class="res-section-t">REFERENCIAS</div>
        <div class="res-meta"><b>📍 Lugares:</b> ${C.lugares}</div>
        <div class="res-meta"><b>🎧 DJs:</b> ${C.djs}</div>
        <div class="res-meta"><b>🎵 BPM:</b> ${C.bpm}</div>
        <div class="res-meta"><b>🧍 Cuerpo:</b> ${C.cuerpo}</div>
        ${C.mecanismo?`<div class="res-meta"><b>⚙️ Mecanismo:</b> ${C.mecanismo}</div>`:""}
        <div class="res-meta"><b>⚡ Energías disponibles:</b> ${energiasText}</div>
      </div>

      ${tempBlocks}

      <div class="val">
        <div class="val-t">CÓMO RECONOCERLO</div>
        ${C.test.map(t=>`<div class="val-q">${t}</div>`).join("")}
      </div>
    </div>
    <button class="btn" onclick="renderListBrowser()">← Ver todas las listas</button>
  `;
  window.scrollTo({top:0});
}

// ─── REFERENCE PAGE ───
function renderReference(){
  document.getElementById("main").innerHTML=`
    <div class="intro">
      <b>Sistema Cirujano v6 — referencia técnica</b><br>
      Esta es la "constitución" del sistema. Consultar siempre que haya duda sobre cómo funciona.
    </div>

    <div class="ref-card">
      <div class="ref-card-h">PRINCIPIOS FUNDACIONALES</div>
      <div class="ref-card-t">Las 6 reglas del sistema</div>
      <div class="principle-row"><span class="principle-num">1.</span><span><b>El cuadro es UNA SENSACIÓN concreta</b>, no un lugar ni un género. Lugar + gente + hora + intención + sonido. El nombre del local es etiqueta.</span></div>
      <div class="principle-row"><span class="principle-num">2.</span><span><b>3 ejes separados sin mezclar:</b> Cuadro (lista física), Temperatura (color del track), Energía (principal/pico). Tres etiquetas independientes.</span></div>
      <div class="principle-row"><span class="principle-num">3.</span><span><b>La temperatura es relativa al cuadro.</b> Cálido en pool no es lo mismo que cálido en Berghain. Siempre se ofrecen las 3 temperaturas — algunas marcadas como RARO PERO POSIBLE para matices.</span></div>
      <div class="principle-row"><span class="principle-num">4.</span><span><b>Asimetría es información.</b> No todos los cuadros tienen las 3 temperaturas iguales. No todos tienen pico. No todos necesitan warm up. Eso es válido.</span></div>
      <div class="principle-row"><span class="principle-num">5.</span><span><b>Duplicación permitida</b> cuando un track sirve a 2 cuadros. Apple Music lo permite. Tale of Us puede vivir en E y K.</span></div>
      <div class="principle-row"><span class="principle-num">6.</span><span><b>Sistema portátil</b> — funciona con CDJ + mixer estándar, no requiere setup en casa.</span></div>
    </div>

    <div class="ref-card">
      <div class="ref-card-h">LOS 3 EJES</div>
      <div class="ref-card-t">Cómo se etiqueta cada track</div>
      <div class="ref-card-d"><b>EJE 1 · CUADRO</b> — la lista física en Apple Music. 16 listas: 13 cuadros propios (A-M) + 3 warm ups (WC, WF, WO).</div>
      <div class="ref-card-d"><b>EJE 2 · TEMPERATURA</b> — color del track. Cálido (humano) / Frío (mecánico, te ignora) / Oscuro (sombra, te presiona). Relativo a cada cuadro.</div>
      <div class="ref-card-d"><b>EJE 3 · ENERGÍA</b> — momento del set. Principal (sostén base, 1 hora) / Pico (clímax). Para warm ups: solo Apertura.</div>
      <div class="ref-card-d"><b>Ejemplo:</b> Mulero loop frío rotundo a 132 BPM → <b>Tresor Berlin (I) + Frío + Pico</b>. Maceo Plex Conjure Bots a 124 BPM → <b>Central Club Porto (E) + Frío + Principal</b>.</div>
    </div>

    <div class="ref-card">
      <div class="ref-card-h">MECANISMOS DEL CUERPO</div>
      <div class="ref-card-t">Cómo te posiciona la música</div>
      <div class="ref-card-d">Información anexa para distinguir cuadros que comparten BPM o sonido. NO es eje del sistema.</div>
      <div class="mech"><div class="mech-h arriba">↑ ARRIBA</div><div class="mech-d"><b>El cuerpo se eleva.</b> Cabeza alta, ojos abiertos, copa en mano. La música acompaña sin pesar. <b>Cuadros:</b> A (estático), F (ligero), B (ligero social), M (contemplativo).</div></div>
      <div class="mech"><div class="mech-h horiz">→ HORIZONTAL</div><div class="mech-d"><b>El cuerpo en pista.</b> Cuerpo activo bailando, sigues siendo tú. <b>Cuadros:</b> C (consciente), D (intenso), E (consciente), G (oscuro), H (hipnótico), L (borderline).</div></div>
      <div class="mech"><div class="mech-h abajo">↓ ABAJO</div><div class="mech-d"><b>El cuerpo se rinde.</b> Cabeza baja, te disuelves. <b>Cuadros:</b> J (rendido al sitio), K (masivo a la masa), I (disuelto al loop).</div></div>
    </div>

    <div class="ref-card">

      <div class="ref-card-t">Qué celdas existen</div>

          <tbody>
            ${Object.entries(CUADROS).map(([id,C])=>{
              const cal=C.temps.calido.rare?'<td class="rare">raro</td>':'<td class="has">sí</td>';

        <div class="dist-c-row">ANULA con loops quirúrgicos vs APLASTA con atmósfera vs APLASTA con escala.</div>
      </div>
      <div class="dist-c">
        <div class="dist-c-h">Indepth vs Jeweil (mismo cuadro K)</div>
        <div class="dist-c-row"><b>K Cálido (Indepth)</b> <span class="dist-c-vs">vs</span> <b>K Frío (Jeweil)</b></div>

      </div>
      <div class="dist-c">
        <div class="dist-c-h">Pool vs Lilás</div>
        <div class="dist-c-row"><b>B Cálido (Folamour pool)</b> <span class="dist-c-vs">vs</span> <b>C Cálido (Kerri Chandler en monte)</b></div>
        <div class="dist-c-row">Hits reconocibles que no se juzgan vs Versiones extendidas que la gente paga por la selección.</div>
      </div>
      <div class="dist-c">
        <div class="dist-c-h">Voices From The Lake vs Mulero</div>
        <div class="dist-c-row"><b>L Cálido (Voices)</b> <span class="dist-c-vs">vs</span> <b>I Frío (Mulero)</b></div>
        <div class="dist-c-row">Bosque mental misterioso emotivo vs Loop quirúrgico mecánico sin emoción.</div>
      </div>
      <div class="dist-c">
        <div class="dist-c-h">Garnier transversal — track a track</div>

    <div class="ref-card">
      <div class="ref-card-h">REGLAS OPERATIVAS</div>
      <div class="ref-card-t">Cómo se opera en Apple Music</div>
      <div class="principle-row"><span class="principle-num">1.</span><span><b>Cada track lleva 3 etiquetas:</b> cuadro + temperatura + energía. Ej: I + Frío + Pico.</span></div>
      <div class="principle-row"><span class="principle-num">2.</span><span><b>Duplicación permitida</b> (máx 2 cuadros) cuando el track sirve a ambos.</span></div>
      <div class="principle-row"><span class="principle-num">3.</span><span><b>DJ ≠ cuadro.</b> Cada track se clasifica individualmente. Garnier va a varios cuadros según track. Jeweil viejo (E) ≠ Jeweil actual (K).</span></div>
      <div class="principle-row"><span class="principle-num">4.</span><span><b>Las 3 temperaturas siempre disponibles</b> en cada cuadro. Algunas marcadas RARO PERO POSIBLE — válidas para matices, no excluidas.</span></div>

render();
