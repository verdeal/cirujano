<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cirujano v5 — Cuadros Vivos</title>
<style>
:root{
  --bg:#0A0A0F;--card:#14141C;--card2:#1C1C26;--brd:#2A2A38;
  --tx:#F0F0F5;--tx2:#C0C0CC;--tx3:#9090A0;--tx4:#606070;
  --green:#34D399;--red:#EF4444;--amber:#F59E0B;
  --calido:#F97316;--frio:#7CD4F4;--oscuro:#A78BFA;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;line-height:1.55;min-height:100vh;overscroll-behavior:none}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.app{max-width:600px;margin:0 auto;padding:18px 14px 32px}

.hd{text-align:center;margin-bottom:18px;padding:8px 0}
.hd-t{font-size:11px;letter-spacing:3px;color:var(--tx4);font-weight:600;margin-bottom:4px}
.hd-n{font-size:22px;font-weight:800;color:var(--tx);letter-spacing:1px}

.tabs{display:flex;gap:6px;margin-bottom:18px;background:var(--card2);padding:4px;border-radius:10px}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--tx3);background:none;border:none;border-radius:8px;cursor:pointer;font-family:inherit}
.tab.on{background:var(--card);color:var(--tx)}

.pg{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.pg-d{width:8px;height:8px;border-radius:50%;background:var(--brd);transition:.2s}
.pg-d.on{background:var(--green);transform:scale(1.4)}
.pg-d.done{background:var(--green);opacity:.5}

.q{background:var(--card);border:1px solid var(--brd);border-radius:18px;padding:20px 16px;margin-bottom:14px}
.q-num{font-size:11px;letter-spacing:2px;color:var(--tx4);font-weight:600;margin-bottom:8px}
.q-t{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:8px;line-height:1.3}
.q-s{font-size:14px;color:var(--tx2);margin-bottom:16px;line-height:1.55}
.q-s b{color:var(--tx);font-weight:700}

.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--card2);border:1.5px solid var(--brd);border-radius:14px;padding:14px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;text-align:left;color:var(--tx);font-family:inherit;font-size:14px;width:100%;transition:.15s}
.opt:active{transform:scale(.98);background:var(--brd)}
.opt-ic{font-size:24px;flex-shrink:0;line-height:1;width:32px;text-align:center}
.opt-bd{flex:1;min-width:0}
.opt-l{font-weight:700;color:var(--tx);margin-bottom:5px;font-size:15px;line-height:1.3}
.opt-d{font-size:13px;color:var(--tx2);line-height:1.5}
.opt-d b{color:var(--tx);font-weight:600}
.opt-ex{font-size:12px;color:var(--tx3);line-height:1.5;margin-top:6px;padding-top:6px;border-top:1px solid var(--brd)}
.opt-ex b{color:var(--tx2)}

.back{background:none;border:none;color:var(--tx3);font-family:inherit;font-size:14px;padding:10px;cursor:pointer;margin-top:10px;display:block;width:100%;text-align:center}
.back:active{color:var(--tx)}
.btn{padding:14px;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;border:1.5px solid var(--brd);background:var(--card);color:var(--tx);width:100%;margin-top:10px}
.btn-pri{background:var(--green);color:#0A0A0F;border-color:var(--green)}
.btn:active{transform:scale(.98)}

.res{background:var(--card);border-radius:20px;padding:20px 16px;margin-bottom:12px;border:2px solid var(--brd)}
.res.primary{border-color:var(--green)}
.res.secondary{border-color:var(--amber);opacity:.95}
.res-tag{font-size:10px;letter-spacing:2px;font-weight:700;margin-bottom:8px;text-transform:uppercase}
.res.primary .res-tag{color:var(--green)}
.res.secondary .res-tag{color:var(--amber)}
.res-id{display:inline-block;padding:3px 8px;border-radius:6px;background:var(--card2);font-size:12px;font-weight:700;margin-right:8px;letter-spacing:1px}
.res-n{font-size:20px;font-weight:800;color:var(--tx);margin-bottom:8px;line-height:1.25}
.res-temp{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:14px}
.res-temp.calido{background:rgba(249,115,22,.15);color:var(--calido)}
.res-temp.frio{background:rgba(124,212,244,.15);color:var(--frio)}
.res-temp.oscuro{background:rgba(167,139,250,.15);color:var(--oscuro)}
.res-d{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:14px}
.res-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--brd)}
.res-section-t{font-size:11px;letter-spacing:1.5px;color:var(--tx4);font-weight:700;margin-bottom:8px;text-transform:uppercase}
.res-meta{font-size:13.5px;color:var(--tx2);line-height:1.6;margin-bottom:6px}
.res-meta b{color:var(--tx);font-weight:700}

.val{background:var(--card2);border:1.5px solid var(--brd);border-radius:12px;padding:14px;margin-top:14px}
.val-t{font-size:11px;letter-spacing:1.5px;color:var(--amber);font-weight:700;margin-bottom:10px}
.val-q{font-size:13.5px;color:var(--tx);margin-bottom:10px;line-height:1.55;padding-left:20px;position:relative}
.val-q:before{content:"✓";position:absolute;left:0;top:0;color:var(--green);font-weight:700}

.trail{background:var(--card2);border-radius:12px;padding:12px;margin-top:12px;font-size:11px;color:var(--tx3);line-height:1.7}
.trail b{color:var(--tx2)}

.lst{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
.lst:active{background:var(--card2)}
.lst-ic{font-size:24px;flex-shrink:0}
.lst-bd{flex:1;min-width:0}
.lst-id{font-size:11px;color:var(--tx4);font-weight:700;letter-spacing:1px;margin-bottom:2px}
.lst-n{font-weight:700;color:var(--tx);margin-bottom:3px;font-size:15px}
.lst-d{font-size:12.5px;color:var(--tx3);line-height:1.45}
.section-h{font-size:11px;letter-spacing:2px;color:var(--tx4);font-weight:700;margin:18px 0 10px;text-transform:uppercase}
.section-h:first-child{margin-top:0}

.intro{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.25);border-radius:12px;padding:14px;margin-bottom:14px;font-size:13.5px;color:var(--tx2);line-height:1.6}
.intro b{color:var(--green)}

.multi-hdr{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:14px;margin-bottom:14px;font-size:13.5px;color:var(--tx2);line-height:1.6;text-align:center}
.multi-hdr b{color:var(--amber)}

.temp-pick{background:var(--card2);border:1.5px solid var(--brd);border-radius:14px;padding:14px;cursor:pointer;text-align:left;color:var(--tx);font-family:inherit;width:100%;font-size:14px;margin-bottom:10px;transition:.15s}
.temp-pick:active{transform:scale(.98)}
.temp-pick.calido{border-color:rgba(249,115,22,.4)}
.temp-pick.frio{border-color:rgba(124,212,244,.4)}
.temp-pick.oscuro{border-color:rgba(167,139,250,.4)}
.temp-pick-h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.temp-pick-h-ic{font-size:22px}
.temp-pick-h-l{font-weight:800;font-size:15px}
.temp-pick-h-l.calido{color:var(--calido)}
.temp-pick-h-l.frio{color:var(--frio)}
.temp-pick-h-l.oscuro{color:var(--oscuro)}
.temp-pick-def{font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:8px}
.temp-pick-ctx{font-size:12px;color:var(--tx3);line-height:1.5;padding:8px 10px;background:var(--card);border-radius:8px;margin-top:6px}
.temp-pick-ctx b{color:var(--tx2)}
.temp-pick-empty{font-size:12px;color:var(--tx4);font-style:italic;padding:8px 10px;background:var(--card);border-radius:8px;margin-top:6px}
</style>
</head>
<body>
<div class="app">

<div class="hd">
  <div class="hd-t">CIRUJANO V5 · CUADROS VIVOS</div>
  <div class="hd-n">¿Dónde va este track?</div>
</div>

<div class="tabs">
  <button class="tab on" id="tab-clas" onclick="showTab('clas')">Clasificar</button>
  <button class="tab" id="tab-list" onclick="showTab('list')">Ver listas</button>
</div>

<div id="main"></div>

</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// CUADROS — texto técnico amplio, sin abstracción
// ═══════════════════════════════════════════════════════════════════════════

const CUADROS={
  A:{
    tipo:'nuclear',
    icon:'🏛️',
    n:"Local mediano oscuro envolvente",
    short:"Club selecto comprimido",
    intro:"Sala mediana cerrada (300-1500 personas) con sonido envolvente y producción cuidada. Hora 1-3am. Público que ha pagado por ir a un club específico porque conocen al DJ o el sello. La gente baila moviendo el cuerpo poco — más cabeza y torso que culo. Vienen a escuchar tanto como a bailar.",
    detalle:"El sonido protagonista son sintetizadores marcados (bajos profundos, pads largos, leads retro) y baterías limpias. Producción nítida, mezcla con espacio. El track tiende a evolucionar despacio durante 7-10 minutos. NO hay vocales evidentes ni hits — predomina lo instrumental con ego. Marco BPM 118-128. Si suena Maceo Plex modo Conjure, Bodzin, Mind Against, Marco Pohl deep tech, Innellea, A Sagittariun, este es el sitio.",
    djs:"Maceo Plex (Conjure series) · Stephan Bodzin · Mind Against · Innellea · Marco Pohl · Boris Brejcha · Recondite · Tale of Us en sala mediana · ANNA · Worakls modo club",
    lugares:"Watergate Berlin · Razzmatazz salas · Fuse London · clubs medianos cerrados con buen sound system · giras de DJs purista en clubs de 500-1500 cap",
    bpm:"118-128 BPM · indie dark techno · deep tech · melodic techno modo club · Italo moderno · synthpop oscuro de 2010+ · microhouse atmosférico de pista",
    temps:{
      calido:{
        def:"Synth con calor humano residual o anhelo emocional. Hay melodía que evoca, pero la producción sigue siendo sintética y de ego. NO es Postureo sexual de pista.",
        examples:"Bodzin 'Singularity', Recondite cálido, Innellea melódico cálido, Bicep 'Glue', Maksim Dark con melodía emocional. Tracks que tienen synth lead protagonista que canta sin cantar.",
        signal:"Cuando lo escuchas piensas \"qué pena que no haya vocal\" pero el synth ocupa ese hueco emocional."
      },
      frio:{
        def:"Synth retro o sintético sin emoción humana. Ego puro, distancia, chulería autoreferencial. La textura es maquinal, no humana. Te ignora.",
        examples:"Maceo Plex 'Conjure Bots' / 'Mutant Future', Marco Pohl deep tech, A Sagittariun 'Vanishing Point', Boris Brejcha, ro-minimal Rhadoo modo club. Tracks que suenan a synth retro Carpenter o a máquina autorreferencial.",
        signal:"Cuando lo escuchas no sientes nada humano, pero te mola la chulería sintética."
      },
      oscuro:{
        def:"Sombra envolviendo el track sin amenaza explícita de villano. La sala se vuelve oscura por el peso atmosférico, no por una narrativa de suspense. Más denso que frío.",
        examples:"Tale of Us 'Astral' (modo hipnótico), Mind Against modo dark, dark synthwave Perturbator club, Carbon & Wahrlich club, Boris Brejcha modo dark.",
        signal:"Cuando lo escuchas la pista se vuelve más densa, hay peso, pero sigues bailando."
      }
    },
    test:[
      "¿Te imaginas una sala mediana cerrada con sonido envolvente y gente que ESCUCHA tanto como baila?",
      "¿Hay synth retro / sintético protagonista (no vocal, no riff de pista, no kick puro)?",
      "¿BPM entre 118 y 128, con evolución lenta de 7-10 minutos?"
    ]
  },
  B:{
    tipo:'nuclear',
    icon:'🔥',
    n:"Pista de club a tope",
    short:"Pista caliente",
    intro:"DC10 Circoloco, Music On con Carola, Sankeys. Hora 3-5am. La sala llena de cuerpos pegados sudando. Música tech-house de Postureo elegante, donde el groove sensual manda y la gente se mueve con el culo y el torso pegado a otros.",
    detalle:"El sonido protagonista son percusión sensual (congas, shakers, bombo cargado), bajos rodantes, pequeños samples vocales o gritos puntuales. NO hay sintes melódicos largos — predomina el groove. La estructura es loop con breakdowns cortos que devuelven al groove rápido. BPM 122-128. Es la música de pista internacional bailable: Marco Carola, Jamie Jones, Hot Creations, Cuttin' Headz, todo el sello Solid Grooves.",
    djs:"Marco Carola · Jamie Jones · Loco Dice · Solardo · Pablo Fierro · Apollonia · Hot Creations sound · Lee Foss · Steve Lawler · Cuartero modo caliente",
    lugares:"DC10 Circoloco lunes · Music On Amnesia · Sankeys · Pacha lunes · Hï techno room · Cocoon Frankfurt · WooMooN Cova Santa",
    bpm:"122-128 BPM · tech-house · Afro house bailable · tribal house · Latin house · UK garage groovero · amapiano de pista · big beat moderno",
    temps:{
      calido:{
        def:"Groove con calor humano sensual. Vocales sample, percusión latina/tribal, ambiente de Postureo elegante con sonrisa.",
        examples:"Marco Carola tribal latino, Jamie Jones con vocal hooks, Hot Creations clásico, Pablo Fierro Afro bailable, Latin house, baile funk groovero.",
        signal:"Cuando lo escuchas piensas 'cuerpos pegados moviéndose con descaro elegante'."
      },
      frio:{
        def:"Groove con producción seca o mecánica, percusión menos orgánica, samples más sintéticos. Bailable pero sin Postureo cálido.",
        examples:"Tech-house más limpio y minimal, electroclash bailable, electro funk de pista. Apollonia modo seco, algún DJ Sneak frío.",
        signal:"Lo bailas pero no es para frotarse — es más mecánico."
      },
      oscuro:{
        def:"El mismo groove bailable pero con sombra puntual envolviendo. La pista a tope se vuelve más seria pero todavía no es Pista oscura 4am del cuadro G — sigue siendo peak caliente.",
        examples:"Carola 'Fly With Me' modo dark, dubstep de pista oscuro pero bailable, Afro tech con sombra de Themba.",
        signal:"Sigues bailando con cuerpo pegado pero la sala está más seria."
      }
    },
    test:[
      "¿BPM 122-128 con groove de Postureo elegante (no oscuro Minus, no marcial duro)?",
      "¿La percusión protagonista (congas, shakers, bombos sensuales) por encima de cualquier synth?",
      "¿Te imaginas a Marco Carola pinchando esto en Music On clásico a las 3am?"
    ]
  },
  C:{
    tipo:'nuclear',
    icon:'🏔️',
    n:"Festival selecto al aire libre (tipo Lilás)",
    short:"Festival selecto",
    intro:"Festival al aire libre en monte o naturaleza, capacidad 800-3000 personas. Atardecer y noche. La gente paga la entrada por la SELECCIÓN del DJ — saben que viene Kerri Chandler, Garnier, Larry Heard. Bailan pero también valoran lo que suena. Hay sonrisas y conversaciones, no es un club cerrado oscuro.",
    detalle:"El sonido protagonista es Chicago house antiguo sintético en versión extendida, soulful elegante con piano, Detroit emocional, cosmic disco serio. Tracks largos (8-12 minutos) que evolucionan con clase. NO hay drops ni hits comerciales. Versiones de vinilo que no suenan en pool parties. BPM 116-126. Lilás (Lisboa), Eléctrico (Portugal), Sunsetstrip (Mendoza) son referencias.",
    djs:"Kerri Chandler en monte · Larry Heard extended · Theo Parrish · Garnier modo serio · Black Coffee narrativo · DJ Harvey serio · Moodymann elegante · Ron Trent extended",
    lugares:"Lilás Lisboa monte · Eléctrico Portugal · festivales boutique al aire libre · Sunsetstrip Mendoza · backyard festivals selectos · monte con sonido bueno",
    bpm:"116-126 BPM · soulful elegante extended · Chicago house serio sintético · Detroit emocional narrativo · cosmic disco serio · liquid d&b · Afro house narrativo",
    temps:{
      calido:{
        def:"Calor humano elegante, vocal o piano emotivo, melodía con clase. La mayoría de tracks de este cuadro caen aquí — es la temperatura natural del Lilás.",
        examples:"Kerri Chandler 'Bar A Thym', Larry Heard 'Mystery of Love' extended, Garnier 'Acid Eiffel', Detroit emocional Carl Craig, Caribou 'Odessa', Moodymann elegante.",
        signal:"Lo escuchas y sientes 'cómo me gustaría estar en monte con esto sonando'."
      },
      frio:{
        def:"Synth distante elegante sin calor humano, retro Carpenter, producción seca elegante. Raro pero existe — Garnier sintético, A Sagittariun, Italo moderno serio.",
        examples:"A Sagittariun 'Vanishing Point', Italo moderno Tensnake, cosmic indie dance Lena Willikens, Garnier modo synth seco.",
        signal:"Tiene clase y es de monte, pero no te toca el corazón — te toca la cabeza."
      },
      oscuro:{
        def:"Casi vacío en este cuadro. Si aparece sería Detroit techno cósmico con sombra, o algún Mind Against narrativo cuando el festival selecto se vuelve nocturno tarde.",
        examples:"Detroit techno cósmico oscuro Carl Craig nocturno, Mind Against narrativo cuando entra noche cerrada.",
        signal:"Raro en Lilás. Si lo pondrías es muy entrada la noche cuando el festival se ha vuelto club."
      }
    },
    test:[
      "¿Es una versión EXTENDIDA o B-side, no un hit que también suena en pool parties?",
      "¿La gente vendría aquí por la SELECCIÓN (saben quién pincha) y no solo por el ambiente?",
      "¿Te imaginas el track sonando con monte detrás y atardecer cayendo, no en sala cerrada?"
    ]
  },
  D:{
    tipo:'nuclear',
    icon:'🕳️',
    n:"Cueva grande (Berghain main floor)",
    short:"Cueva opresiva",
    intro:"Berghain main floor a las 4am. Cueva industrial enorme con techos altos de 12 metros. Capacidad 1500-3000 personas. La gente lleva 6+ horas dentro y se ha rendido al sitio. La atmósfera densa del lugar te aplasta — no te persigue un villano, es el LUGAR el que pesa por su acústica, su escala y su hora.",
    detalle:"El sonido protagonista es techno Berlin con kick contundente seco, pads atmosféricos densos, percusión metálica, EBM techno con riff oscuro. NO hay calor humano residual ni vocales emotivas. Producción cruda con compresión brutal. Los tracks suelen ser 7-10 minutos sin breakdowns evidentes. BPM 130-138. Khidi Tbilisi y Bassiani son las otras referencias mundiales del mismo cuadro.",
    djs:"Ben Klock · Marcel Dettmann · Rødhåd · Marcel Fengler · Pig & Dan · BORTZ · Phase Fatale · Etapp Kyle · Norman Nodge · Function · DVS1",
    lugares:"Berghain main floor 4am · Khidi Tbilisi · Bassiani · Tresor Globus · Robert Johnson modo dark · clubs techno serios europeos con sound system industrial",
    bpm:"130-138 BPM · Berlin techno oscuro · EBM techno · dark techno atmosférico · industrial groovero · psytrance dark hipnótico bailable",
    temps:{
      calido:{
        def:"Casi vacío en este cuadro. El calor humano no encaja en Berghain main floor — si un track Berghain tiene calor, probablemente va al cuadro A (Local mediano selecto) o al cuadro F (Nave grande con épica).",
        examples:"Raro. Algún track Ben Klock con synth vagamente emotivo, pero infrecuente.",
        signal:"Si te encaja en cuadro D pero suena cálido, revisa si va a A o F."
      },
      frio:{
        def:"Producción seca, mecánica, percusión metálica sin emoción. Frialdad industrial. La sala te aplasta sin sombra — te aplasta por mecánica.",
        examples:"Marcel Dettmann modo minimal, electro Detroit frío DJ Stingray, dub techno groovero Basic Channel modo bailable, Etapp Kyle frío, Norman Nodge.",
        signal:"Te aplasta sin tocarte el corazón. Solo mecánica."
      },
      oscuro:{
        def:"La temperatura natural del cuadro D. Sombra atmosférica densa, peso opresivo, pads largos oscuros, riffs amenazantes envolviendo. EBM techno protagonista.",
        examples:"Ben Klock atmosférico, Pig & Dan 'Chemistry', Rødhåd, Phase Fatale, BORTZ 'Steady Note', Marcel Fengler modo dark, dark techno atmosférico DVS1.",
        signal:"La sala se vuelve cueva tenebrosa. Sigues bailando pero con peso encima."
      }
    },
    test:[
      "¿Suena al SITIO más que al track? ¿La atmósfera densa de la sala se nota más que la melodía del track?",
      "¿Ben Klock o Marcel Dettmann lo pincharían en Berghain main floor a las 4am de un sábado?",
      "¿BPM 130-138, kick seco contundente, sin vocales emotivas ni synth lead retro?"
    ]
  },
  E:{
    tipo:'nuclear',
    icon:'🌫️',
    n:"Sesión larga de viaje",
    short:"Viaje progressive deep",
    intro:"Cattaneo open-to-close 8 horas. Sunwaves Romania con Rhadoo 8 horas. fabric Room 1 con un solo DJ pinchando 6 horas. La gente entra al club a las 23h y sale a las 7-9h. Se baila con ojos cerrados, el tiempo desaparece. El DJ construye un viaje narrativo lento.",
    detalle:"El sonido protagonista es progressive deep introspectivo o ro-minimal atmosférico bailable. Tracks de 9-12 minutos con evolución muy lenta — un elemento entra cada 2 minutos. NO hay drops dramáticos ni cambios de carácter bruscos. La progresión es gradual. BPM 118-126. Se distingue de cuadro A porque los tracks son más largos, más atmosféricos y menos chuleros, y se distingue de cuadro D porque es bailable sin aplastar.",
    djs:"Hernán Cattaneo · Sasha & Digweed · Brian Cid · Rhadoo · Raresh · John Digweed · Guy J · Nick Warren · Petar Dundov · Audion narrativo · Henry Saiz · Cid Inc",
    lugares:"Sunwaves Romania · fabric Room 1 · Cattaneo Buenos Aires open-to-close · Sunsetstrip Mendoza nocturno · sets de 6-12h con un solo DJ",
    bpm:"118-126 BPM · progressive deep · ro-minimal bailable · deep tech profundo · Sudbeat sound · Bedrock sound · trance techno hipnótico modo viaje",
    temps:{
      calido:{
        def:"Viaje con melodía emocional, leads largos que evocan, deep house elegante apertura. Cattaneo emocional, Brian Cid lado luminoso.",
        examples:"Cattaneo 'Sudbeat tracks' emocionales, Brian Cid 'Light In The Lotus', Sasha 'Xpander' modo loop largo, Guy J emotional, Nick Warren con melodía.",
        signal:"Vas viajando y sientes melodía emotiva en cada vuelta de 16 compases."
      },
      frio:{

  // ───── RESULTADOS MÚLTIPLES ─────

// ═══════════════════════════════════════════════════════════════════════════
// STATE & RENDER
// ═══════════════════════════════════════════════════════════════════════════
let state={node:"start",path:[],trail:[],resultCuadros:null,temp:null};
let tab="clas";

function showTab(t){
  tab=t;
  document.getElementById("tab-clas").classList.toggle("on",t==="clas");
  document.getElementById("tab-list").classList.toggle("on",t==="list");
  if(t==="clas")render(); else renderListBrowser();
}

function reset(){
  state={node:"start",path:[],trail:[],resultCuadros:null,temp:null};
  render();
}

function pick(next,label){
  state.trail.push({q:TREE[state.node]?.q||"",a:label});
  state.path.push(state.node);
  if(typeof next==="object" && next.cuadro){
    state.resultCuadros=[next.cuadro];
    renderTemperaturaSelector();
    return;
  }
  if(TREE[next]&&TREE[next].multi){
    state.resultCuadros=TREE[next].multi;
    renderTemperaturaSelector();
    return;
  }
  state.node=next;
  render();
}

function back(){
  if(state.temp){
    state.temp=null;
    renderTemperaturaSelector();
    return;
  }
  if(state.resultCuadros){
    state.resultCuadros=null;
    state.node=state.path.pop();
    state.trail.pop();
    render();
    return;
  }
  if(state.path.length===0)return;
  state.node=state.path.pop();
  state.trail.pop();
  render();
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER PREGUNTA
// ═══════════════════════════════════════════════════════════════════════════
function render(){
  if(tab!=="clas")return;
  const node=TREE[state.node];if(!node)return;
  const totalDepth=4;
  const dots=[];
  for(let i=0;i<totalDepth;i++){
    const cls=i<state.path.length?"done":(i===state.path.length?"on":"");
    dots.push(`<div class="pg-d ${cls}"></div>`);
  }
  const opts=node.opts.map(o=>`
    <button class="opt" onclick='pick(${JSON.stringify(o.next)},${JSON.stringify(o.l)})'>
      <div class="opt-ic">${o.ic}</div>
      <div class="opt-bd">
        <div class="opt-l">${o.l}</div>
        <div class="opt-d">${o.d}</div>
        ${o.ex?`<div class="opt-ex">${o.ex}</div>`:""}
      </div>
    </button>
  `).join("");
  const trailHtml=state.trail.length?`<div class="trail">${state.trail.map(t=>`<div><b>${t.q}</b> → ${t.a}</div>`).join("")}</div>`:"";
  const isFirst=state.node==="start";
  const intro=isFirst?`<div class="intro"><b>Cómo funciona el clasificador:</b><br>2-4 preguntas técnicas → te lleva a 1 o 2 cuadros (escenas vivas) → seleccionas la temperatura del track contextualizada por cuadro → ficha completa con DJs, lugares, BPM, géneros y validación final.</div>`:"";
  document.getElementById("main").innerHTML=`
    <div class="pg">${dots.join("")}</div>
    ${intro}
    <div class="q">
      <div class="q-num">PREGUNTA ${state.path.length+1} DE ~3</div>
      <div class="q-t">${node.q}</div>
      ${node.s?`<div class="q-s">${node.s}</div>`:""}
      <div class="opts">${opts}</div>
    </div>
    ${state.path.length>0?`<button class="back" onclick="back()">← Atrás</button>`:""}
    ${trailHtml}
  `;
  window.scrollTo({top:0});
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER SELECTOR DE TEMPERATURA — contextualizada por cuadro
// ═══════════════════════════════════════════════════════════════════════════
function renderTemperaturaSelector(){
  const cuadros=state.resultCuadros;
  const isMulti=cuadros.length>1;

  const cuadrosInfo=cuadros.map((id,i)=>{
    const C=CUADROS[id];
    return `
      <div class="res ${i===0?'primary':'secondary'}">
        <div class="res-tag">${i===0?'CUADRO PRINCIPAL':'TAMBIÉN PODRÍA SER'} · ${id}</div>
        <div><span class="res-id">${id}</span></div>
        <div class="res-n" style="margin-top:6px">${C.icon} ${C.n}</div>
        <div class="res-d">${C.intro}</div>
      </div>
    `;
  }).join("");

  const tempOptions=[
    {id:'calido',ic:'🟠',l:'Cálido',def:"Temperatura emocional cálida — calor humano residual o protagonista. Vocal, melodía, anhelo, percusión orgánica, ambiente social."},
    {id:'frio',ic:'⚪',l:'Frío',def:"Temperatura emocional fría — sin emoción humana. Sintético, mecánico, distancia, ego retro autoreferencial. <b>Te ignora</b> mientras suena."},
    {id:'oscuro',ic:'⚫',l:'Oscuro',def:"Temperatura emocional oscura — sombra envolviendo el track. Peso, amenaza, atmósfera densa. <b>Te presiona</b> mientras suena."}
  ];

  const tempCards=tempOptions.map(t=>{
    const ctxBlocks=cuadros.map(cid=>{
      const C=CUADROS[cid];
      const ctx=C.temps[t.id];
      const isEmpty=ctx.def.toLowerCase().includes("casi vacío")||ctx.def.toLowerCase().includes("no existe")||ctx.def.toLowerCase().includes("raro");
      const cls=isEmpty?"temp-pick-empty":"temp-pick-ctx";
      return `
        <div class="${cls}">
          <b>En ${cid} (${C.short}):</b><br>
          ${ctx.def}
          ${!isEmpty&&ctx.examples?`<br><br><b>Ejemplos:</b> ${ctx.examples}`:""}
          ${!isEmpty&&ctx.signal?`<br><br><b>Cuándo:</b> ${ctx.signal}`:""}
        </div>
      `;
    }).join("");
    return `
      <button class="temp-pick ${t.id}" onclick='pickTemp(${JSON.stringify(t.id)})'>
        <div class="temp-pick-h">
          <div class="temp-pick-h-ic">${t.ic}</div>
          <div class="temp-pick-h-l ${t.id}">${t.l.toUpperCase()}</div>
        </div>
        <div class="temp-pick-def">${t.def}</div>
        ${ctxBlocks}
      </button>
    `;
  }).join("");

  const multiHdr=isMulti?`<div class="multi-hdr"><b>Este track puede ir a ${cuadros.length} cuadros simultáneamente.</b><br>Apple Music permite duplicación — el track vivirá en ambas listas con la misma temperatura.</div>`:"";

  document.getElementById("main").innerHTML=`
    ${multiHdr}
    ${cuadrosInfo}
    <div class="q" style="margin-top:14px">
      <div class="q-num">PASO FINAL · TEMPERATURA</div>
      <div class="q-t">¿Qué TEMPERATURA tiene el track en este cuadro?</div>
      <div class="q-s">La temperatura es <b>una sola dimensión emocional</b> con tres niveles. <b>Cálido = humano</b>. <b>Frío = mecánico (te ignora)</b>. <b>Oscuro = sombra (te presiona)</b>. La definición es general — la diferencia está en cómo se concreta dentro de cada cuadro. Lee los bloques contextuales por cuadro para decidir.</div>
      ${tempCards}
    </div>
    <button class="back" onclick="back()">← Atrás (cambiar cuadro)</button>
  `;
  window.scrollTo({top:0});
}

function pickTemp(temp){
  state.temp=temp;
  renderResult();
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER RESULTADO FINAL
// ═══════════════════════════════════════════════════════════════════════════
function renderResult(){
  const cuadros=state.resultCuadros;
  const temp=state.temp;
  const isMulti=cuadros.length>1;
  const tempLabel={calido:"🟠 CÁLIDO",frio:"⚪ FRÍO",oscuro:"⚫ OSCURO"}[temp];
  const tempClass={calido:"calido",frio:"frio",oscuro:"oscuro"}[temp];

  const cards=cuadros.map((id,i)=>{
    const C=CUADROS[id];
    const cls=i===0?"res primary":"res secondary";
    const tag=i===0?(isMulti?"CUADRO PRINCIPAL":"DIAGNÓSTICO"):"TAMBIÉN VIVE EN";
    const tempCtx=C.temps[temp];
    return `
      <div class="${cls}">
        <div class="res-tag">${tag}</div>
        <div><span class="res-id">${id}</span></div>
        <div class="res-n" style="margin-top:6px">${C.icon} ${C.n}</div>
        <div class="res-temp ${tempClass}">${tempLabel}</div>
        <div class="res-d">${C.intro}</div>

        <div class="res-section">
          <div class="res-section-t">DETALLE TÉCNICO</div>
          <div class="res-meta">${C.detalle}</div>
        </div>

        <div class="res-section">
          <div class="res-section-t">${tempLabel} en este cuadro</div>
          <div class="res-meta"><b>Definición:</b> ${tempCtx.def}</div>
          ${tempCtx.examples?`<div class="res-meta" style="margin-top:6px"><b>Ejemplos:</b> ${tempCtx.examples}</div>`:""}
          ${tempCtx.signal?`<div class="res-meta" style="margin-top:6px"><b>Cómo lo reconoces:</b> ${tempCtx.signal}</div>`:""}
        </div>

        <div class="res-section">
          <div class="res-section-t">REFERENCIAS</div>
          <div class="res-meta"><b>📍 Lugares:</b> ${C.lugares}</div>
          <div class="res-meta"><b>🎧 DJs:</b> ${C.djs}</div>
          <div class="res-meta"><b>🎵 Géneros y BPM:</b> ${C.bpm}</div>
        </div>

        <div class="val">
          <div class="val-t">⚠️ VALIDACIÓN — comprueba que no has fallado</div>
          ${C.test.map(t=>`<div class="val-q">${t}</div>`).join("")}
        </div>
      </div>
    `;
  }).join("");

  const trailHtml=state.trail.length?`<div class="trail"><b>Camino recorrido:</b><br>${state.trail.map(t=>`<div>${t.q.replace(/<[^>]+>/g,'')} → <b>${t.a}</b></div>`).join("")}</div>`:"";

  const playlistInstr=`
    <div class="intro" style="margin-top:14px">
      <b>📂 En Apple Music:</b> añade el track a la lista <b>${cuadros.join(' + ')}</b> con la etiqueta de temperatura <b>${temp.toUpperCase()}</b>.${isMulti?' Va a las dos listas — duplicación permitida.':''} La etiqueta de temperatura puedes ponerla en el campo "comentarios" del track o en el nombre de la lista (ej: "B-Cálido", "B-Frío").
    </div>
  `;

  document.getElementById("main").innerHTML=`
    ${isMulti?`<div class="multi-hdr"><b>Track con duplicación.</b> Vive en ${cuadros.length} cuadros simultáneamente con la misma temperatura.</div>`:""}
    ${cards}
    ${playlistInstr}
    ${trailHtml}
    <button class="btn btn-pri" onclick="reset()">Clasificar otro track</button>
    <button class="back" onclick="back()">← Cambiar temperatura</button>
  `;
  window.scrollTo({top:0});
}

// ═══════════════════════════════════════════════════════════════════════════
// LIST BROWSER
// ═══════════════════════════════════════════════════════════════════════════
function renderListBrowser(){
  const nucleares=Object.entries(CUADROS).filter(([id,C])=>C.tipo==='nuclear');
  const puentes=Object.entries(CUADROS).filter(([id,C])=>C.tipo==='puente');
  const renderGroup=(title,items)=>`
    <div class="section-h">${title}</div>
    ${items.map(([id,C])=>`
      <div class="lst" onclick="showListDetail('${id}')">
        <div class="lst-ic">${C.icon}</div>
        <div class="lst-bd">
          <div class="lst-id">${id}</div>
          <div class="lst-n">${C.n}</div>
          <div class="lst-d">${C.short}</div>
        </div>
      </div>
    `).join("")}
  `;
  document.getElementById("main").innerHTML=`
    <div class="intro">
      <b>12 listas en total:</b> 8 cuadros nucleares (escenas vivas principales) + 4 escenas-puente (warm ups laxos y cierres). Cada una con descripción técnica, DJs, lugares, BPM y las 3 temperaturas contextualizadas.
    </div>
    ${renderGroup("CUADROS NUCLEARES (8)",nucleares)}
    ${renderGroup("ESCENAS-PUENTE (4)",puentes)}
  `;
  window.scrollTo({top:0});
}

function showListDetail(id){
  const C=CUADROS[id];
  const tempBlocks=Object.entries(C.temps).map(([k,v])=>{
    const lbl={calido:"🟠 CÁLIDO",frio:"⚪ FRÍO",oscuro:"⚫ OSCURO"}[k];
    const cls={calido:"calido",frio:"frio",oscuro:"oscuro"}[k];
    return `
      <div class="res-section">
        <div class="res-section-t" style="color:var(--${cls})">${lbl} en este cuadro</div>
        <div class="res-meta"><b>Definición:</b> ${v.def}</div>
        ${v.examples?`<div class="res-meta" style="margin-top:6px"><b>Ejemplos:</b> ${v.examples}</div>`:""}
        ${v.signal?`<div class="res-meta" style="margin-top:6px"><b>Señal de reconocimiento:</b> ${v.signal}</div>`:""}
      </div>
    `;
  }).join("");
  document.getElementById("main").innerHTML=`
    <div class="res primary">
      <div class="res-tag">${C.tipo==='nuclear'?'CUADRO NUCLEAR':'ESCENA-PUENTE'}</div>
      <div><span class="res-id">${id}</span></div>
      <div class="res-n" style="margin-top:6px">${C.icon} ${C.n}</div>
      <div class="res-d">${C.intro}</div>

      <div class="res-section">
        <div class="res-section-t">DETALLE TÉCNICO</div>
        <div class="res-meta">${C.detalle}</div>
      </div>

      <div class="res-section">
        <div class="res-section-t">REFERENCIAS</div>
        <div class="res-meta"><b>📍 Lugares:</b> ${C.lugares}</div>
        <div class="res-meta"><b>🎧 DJs:</b> ${C.djs}</div>
        <div class="res-meta"><b>🎵 Géneros y BPM:</b> ${C.bpm}</div>
      </div>

      ${tempBlocks}

      <div class="val">
        <div class="val-t">CÓMO RECONOCERLO</div>
        ${C.test.map(t=>`<div class="val-q">${t}</div>`).join("")}
      </div>
    </div>
    <button class="btn" onclick="renderListBrowser()">← Ver todas las listas</button>
  `;
  window.scrollTo({top:0});
}

render();
</script>
